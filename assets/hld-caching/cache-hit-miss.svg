<svg viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="arrow-good" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f8f4e"/>
    </marker>
    <marker id="arrow-bad" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect x="30" y="115" width="110" height="55" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="85" y="147" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Client</text>

  <rect x="260" y="115" width="120" height="55" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="320" y="147" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Cache</text>

  <rect x="490" y="115" width="130" height="55" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="555" y="147" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Slow source</text>

  <line x1="140" y1="132" x2="260" y2="132" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="200" y="122" text-anchor="middle" font-size="10" fill="#6a7178">request</text>

  <line x1="320" y1="115" x2="320" y2="65" stroke="#2f8f4e" stroke-width="1.4" marker-end="url(#arrow-good)"/>
  <line x1="320" y1="65" x2="85" y2="65" stroke="#2f8f4e" stroke-width="1.4"/>
  <line x1="85" y1="65" x2="85" y2="115" stroke="#2f8f4e" stroke-width="1.4" marker-end="url(#arrow-good)"/>
  <text x="200" y="55" text-anchor="middle" font-size="11" fill="#2f8f4e">hit — return cached value immediately</text>

  <line x1="380" y1="150" x2="490" y2="150" stroke="#c0392b" stroke-width="1.4" marker-end="url(#arrow-bad)"/>
  <text x="435" y="140" text-anchor="middle" font-size="10" fill="#c0392b">miss</text>

  <line x1="555" y1="170" x2="555" y2="220" stroke="#3b6ea5" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="555" y1="220" x2="85" y2="220" stroke="#3b6ea5" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="85" y1="220" x2="85" y2="170" stroke="#3b6ea5" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="320" y="240" text-anchor="middle" font-size="10" fill="#6a7178">store result in cache, then reply to client</text>

  <title>Cache hit vs. cache miss</title>
</svg>
