<svg viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <text x="320" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Cache (capacity 3), most-recent on the left</text>

  <rect x="140" y="45" width="80" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="180" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">key 1</text>

  <rect x="240" y="45" width="80" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="280" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">key 2</text>

  <rect x="340" y="45" width="80" height="45" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.4"/>
  <text x="380" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#c0392b">key 3</text>

  <text x="500" y="72" text-anchor="middle" font-size="10" fill="#c0392b">&#8592; least recently used</text>

  <text x="320" y="120" text-anchor="middle" font-size="10" fill="#6a7178">a request for key 4 arrives (a miss) - the cache is full, so key 3 is evicted</text>

  <line x1="320" y1="135" x2="320" y2="165" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>

  <rect x="140" y="185" width="80" height="45" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="180" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#2f8f4e">key 4</text>

  <rect x="240" y="185" width="80" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="280" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">key 1</text>

  <rect x="340" y="185" width="80" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="380" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">key 2</text>

  <text x="500" y="212" text-anchor="middle" font-size="10" fill="#2f8f4e">&#8592; newly inserted</text>

  <text x="320" y="255" text-anchor="middle" font-size="10" fill="#6a7178">key 3 is gone; everything else shifts one slot toward least-recent</text>

  <title>LRU eviction: the least recently used entry is dropped to make room</title>
</svg>
