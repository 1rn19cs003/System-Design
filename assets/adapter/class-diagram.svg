<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .box { fill: #ffffff; stroke: #3b6ea5; stroke-width: 1.5; }
    .title-bg { fill: #eaf1f8; }
    .title { font-size: 13px; font-weight: 600; fill: #2d2f33; }
    .line { fill: #2d2f33; font-size: 11px; }
    .divider { stroke: #3b6ea5; stroke-width: 1; }
    .arrow { stroke: #6a7178; stroke-width: 1.5; fill: none; }
    .arrow-hollow { stroke: #6a7178; stroke-width: 1.5; fill: none; }
    .label { font-size: 11px; fill: #6a7178; }
    .italic { font-style: italic; }
  </style>

  <!-- Target interface -->
  <rect x="30" y="30" width="220" height="60" rx="8" class="box"/>
  <rect x="30" y="30" width="220" height="26" rx="8" class="title-bg"/>
  <rect x="30" y="48" width="220" height="8" class="title-bg"/>
  <text x="140" y="48" text-anchor="middle" class="title italic">«interface» PaymentProcessor</text>
  <line x1="30" y1="56" x2="250" y2="56" class="divider"/>
  <text x="42" y="74" class="line italic">+ pay(amount): void</text>

  <!-- Adapter -->
  <rect x="30" y="150" width="220" height="70" rx="8" class="box"/>
  <rect x="30" y="150" width="220" height="26" rx="8" class="title-bg"/>
  <rect x="30" y="168" width="220" height="8" class="title-bg"/>
  <text x="140" y="167" text-anchor="middle" class="title">ThirdPartyPaymentAdapter</text>
  <line x1="30" y1="176" x2="250" y2="176" class="divider"/>
  <text x="42" y="194" class="line">+ pay(amount): void</text>
  <text x="42" y="210" class="line" font-style="italic">(translates to sdk.makeTransaction)</text>

  <line x1="140" y1="150" x2="140" y2="93" class="arrow-hollow" marker-end="url(#hollow)"/>

  <!-- Adaptee -->
  <rect x="420" y="150" width="230" height="70" rx="8" class="box"/>
  <rect x="420" y="150" width="230" height="26" rx="8" class="title-bg"/>
  <rect x="420" y="168" width="230" height="8" class="title-bg"/>
  <text x="535" y="167" text-anchor="middle" class="title">ThirdPartySDK</text>
  <line x1="420" y1="176" x2="650" y2="176" class="divider"/>
  <text x="432" y="194" class="line">+ makeTransaction(cents, currency)</text>
  <text x="432" y="210" class="line italic">(the adaptee — unchanged)</text>

  <line x1="250" y1="185" x2="418" y2="185" class="arrow" stroke-dasharray="4 3" marker-end="url(#arrowhead)"/>
  <text x="290" y="178" class="label">wraps / delegates to →</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#6a7178"/>
    </marker>
    <marker id="hollow" markerWidth="14" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 Z" fill="#ffffff" stroke="#6a7178" stroke-width="1.2"/>
    </marker>
  </defs>

  <text x="350" y="270" text-anchor="middle" class="label">The caller only ever sees PaymentProcessor.pay() — never knows ThirdPartySDK exists.</text>
</svg>
