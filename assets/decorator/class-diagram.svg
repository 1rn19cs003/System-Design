<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .box { fill: #ffffff; stroke: #3b6ea5; stroke-width: 1.5; }
    .title-bg { fill: #eaf1f8; }
    .title { font-size: 13px; font-weight: 600; fill: #2d2f33; }
    .line { fill: #2d2f33; font-size: 11px; }
    .divider { stroke: #3b6ea5; stroke-width: 1; }
    .arrow-hollow { stroke: #6a7178; stroke-width: 1.5; fill: none; }
    .label { font-size: 11px; fill: #6a7178; }
    .italic { font-style: italic; }
  </style>

  <!-- Coffee interface -->
  <rect x="240" y="20" width="220" height="60" rx="8" class="box"/>
  <rect x="240" y="20" width="220" height="26" rx="8" class="title-bg"/>
  <text x="350" y="38" text-anchor="middle" class="title italic">«interface» Coffee</text>
  <line x1="240" y1="46" x2="460" y2="46" class="divider"/>
  <text x="252" y="64" class="line italic">+ getCost(), getDescription()</text>

  <!-- Espresso -->
  <rect x="60" y="150" width="170" height="46" rx="8" class="box"/>
  <text x="145" y="178" text-anchor="middle" class="title">Espresso</text>

  <!-- CoffeeDecorator abstract -->
  <rect x="470" y="150" width="200" height="60" rx="8" class="box"/>
  <rect x="470" y="150" width="200" height="26" rx="8" class="title-bg"/>
  <text x="570" y="168" text-anchor="middle" class="title italic">«abstract» CoffeeDecorator</text>
  <line x1="470" y1="176" x2="670" y2="176" class="divider"/>
  <text x="482" y="192" class="line">- wrapped: Coffee</text>

  <line x1="145" y1="150" x2="300" y2="83" class="arrow-hollow" marker-end="url(#hollow)"/>
  <line x1="570" y1="150" x2="400" y2="83" class="arrow-hollow" marker-end="url(#hollow)"/>

  <!-- Milk and Caramel -->
  <rect x="400" y="250" width="130" height="46" rx="8" class="box"/>
  <text x="465" y="278" text-anchor="middle" class="title">Milk</text>
  <rect x="550" y="250" width="130" height="46" rx="8" class="box"/>
  <text x="615" y="278" text-anchor="middle" class="title">Caramel</text>

  <line x1="465" y1="250" x2="540" y2="210" class="arrow-hollow" marker-end="url(#hollow)"/>
  <line x1="615" y1="250" x2="600" y2="210" class="arrow-hollow" marker-end="url(#hollow)"/>

  <!-- self-reference: decorator wraps a Coffee (could be another decorator) -->
  <line x1="470" y1="180" x2="230" y2="175" class="arrow-hollow" stroke-dasharray="4 3" marker-end="url(#diamond)"/>
  <text x="260" y="140" class="label">wraps a Coffee (could be another decorator)</text>

  <defs>
    <marker id="hollow" markerWidth="14" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 Z" fill="#ffffff" stroke="#6a7178" stroke-width="1.2"/>
    </marker>
    <marker id="diamond" markerWidth="12" markerHeight="10" refX="1" refY="5" orient="auto">
      <polygon points="0 5, 6 0, 12 5, 6 10" fill="#3b6ea5"/>
    </marker>
  </defs>

  <text x="350" y="320" text-anchor="middle" class="label">new Caramel(new Milk(new Espresso())) — each layer still satisfies the Coffee interface.</text>
</svg>
