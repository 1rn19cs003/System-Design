<svg viewBox="0 0 620 200" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="20" y="65" width="140" height="70" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="90" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">Client</text>

  <rect x="240" y="65" width="140" height="70" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="310" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">DNS</text>
  <text x="310" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Resolver</text>

  <rect x="460" y="65" width="140" height="70" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="530" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">Server</text>

  <line x1="160" y1="90" x2="240" y2="90" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="200" y="75" text-anchor="middle" font-size="11" fill="#6a7178">"api.example.com"?</text>

  <line x1="240" y1="115" x2="160" y2="115" stroke="#3b6ea5" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="200" y="150" text-anchor="middle" font-size="11" fill="#6a7178">93.184.216.34</text>

  <line x1="160" y1="150" x2="460" y2="150" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="310" y="175" text-anchor="middle" font-size="11" fill="#6a7178">connect to that IP</text>

  <title>DNS resolution</title>
</svg>
