  <text x="520" y="740" text-anchor="middle" font-size="12" font-weight="700" fill="#3b6ea5">Capstones — put it all together</text>

  <rect x="300" y="750" width="220" height="55" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="410" y="773" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">LLD Capstone</text>
  <text x="410" y="789" text-anchor="middle" font-size="9" fill="#eaf1f8">Parking Lot (best-fit design)</text>

  <rect x="540" y="750" width="220" height="55" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="650" y="773" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">HLD Capstone</text>
  <text x="650" y="789" text-anchor="middle" font-size="9" fill="#eaf1f8">Rate Limiter (token bucket)</text>

  <!-- Converging arrows into capstones -->
  <line x1="950" y1="124" x2="660" y2="748" stroke="#3b6ea5" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#lpArrow)"/>
  <line x1="670" y1="705" x2="440" y2="748" stroke="#3b6ea5" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#lpArrow)"/>

  <text x="520" y="822" text-anchor="middle" font-size="10" fill="#6a7178">Follow either track top-to-bottom, or interleave them — both roads lead to the same two capstones.</text>

  <title>Complete learning path: Core Principles feeds both an HLD track (7 topics) and an LLD track (OOP, SOLID, then all 23 design patterns), converging on an LLD capstone and an HLD capstone</title>
