<svg viewBox="0 0 1040 860" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="lpArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <text x="520" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#2d2f33">Everything in this guide, and one order to learn it in</text>

  <!-- Core Principles hub -->
  <rect x="20" y="290" width="130" height="110" rx="10" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="85" y="335" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Core</text>
  <text x="85" y="351" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Principles</text>
  <text x="85" y="372" text-anchor="middle" font-size="9" fill="#eaf1f8">(this page)</text>

  <!-- Arrows from hub to both tracks -->
  <line x1="150" y1="310" x2="185" y2="105" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#lpArrow)"/>
  <line x1="150" y1="385" x2="185" y2="480" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#lpArrow)"/>

  <!-- HLD track label (centered over box row: 190 to 1010, mid 600) -->
  <text x="600" y="42" text-anchor="middle" font-size="12" font-weight="700" fill="#3b6ea5">High-Level Design (HLD) — 7 topics</text>

  <!-- HLD row -->
  <rect x="190" y="60" width="120" height="64" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="250" y="87" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Fundamentals</text>
  <text x="250" y="103" text-anchor="middle" font-size="8.5" fill="#6a7178">client, DNS, HTTP</text>

  <rect x="330" y="60" width="120" height="64" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="390" y="87" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Load Balancing</text>
  <text x="390" y="103" text-anchor="middle" font-size="8.5" fill="#6a7178">spread the traffic</text>

  <rect x="470" y="60" width="120" height="64" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="530" y="87" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Caching</text>
  <text x="530" y="103" text-anchor="middle" font-size="8.5" fill="#6a7178">skip repeated work</text>

  <rect x="610" y="60" width="120" height="64" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="670" y="87" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Databases</text>
  <text x="670" y="103" text-anchor="middle" font-size="8.5" fill="#6a7178">store &amp; scale data</text>

  <rect x="750" y="60" width="120" height="64" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="810" y="87" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Message Queues</text>
  <text x="810" y="103" text-anchor="middle" font-size="8.5" fill="#6a7178">decouple services</text>

  <rect x="890" y="60" width="120" height="64" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="950" y="87" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Microservices</text>
  <text x="950" y="103" text-anchor="middle" font-size="8.5" fill="#6a7178">split the system</text>

  <line x1="310" y1="92" x2="330" y2="92" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#lpArrow)"/>
  <line x1="450" y1="92" x2="470" y2="92" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#lpArrow)"/>
  <line x1="590" y1="92" x2="610" y2="92" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#lpArrow)"/>
  <line x1="730" y1="92" x2="750" y2="92" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#lpArrow)"/>
  <line x1="870" y1="92" x2="890" y2="92" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#lpArrow)"/>

  <!-- LLD track label (centered over OOP+SOLID row: 190 to 450, mid 320) -->
  <text x="320" y="465" text-anchor="middle" font-size="12" font-weight="700" fill="#3b6ea5">Low-Level Design (LLD) — OOP + SOLID</text>

  <rect x="190" y="480" width="120" height="50" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="250" y="502" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2f33">OOP</text>
  <text x="250" y="516" text-anchor="middle" font-size="9" fill="#6a7178">Fundamentals</text>

  <rect x="330" y="480" width="120" height="50" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="390" y="502" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2f33">SOLID</text>
  <text x="390" y="516" text-anchor="middle" font-size="9" fill="#6a7178">Principles</text>

  <line x1="310" y1="505" x2="330" y2="505" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#lpArrow)"/>
  <line x1="390" y1="530" x2="265" y2="550" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#lpArrow)"/>

  <!-- Design Patterns label (centered over Creational+Structural+Behavioral row: 190 to 770, mid 480) -->
  <text x="480" y="472" text-anchor="middle" font-size="12" font-weight="700" fill="#3b6ea5">Design Patterns — 23 total</text>

  <!-- Creational box (height increased 175 -> 195 for consistent bottom padding across the row) -->
  <rect x="190" y="530" width="170" height="195" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="275" y="550" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2d2f33">Creational — 5</text>
  <text x="275" y="566" text-anchor="middle" font-size="9" fill="#2d2f33">Singleton</text>
  <text x="275" y="579" text-anchor="middle" font-size="9" fill="#2d2f33">Factory Method</text>
  <text x="275" y="592" text-anchor="middle" font-size="9" fill="#2d2f33">Abstract Factory</text>
  <text x="275" y="605" text-anchor="middle" font-size="9" fill="#2d2f33">Builder</text>
  <text x="275" y="618" text-anchor="middle" font-size="9" fill="#2d2f33">Prototype</text>

  <!-- Structural box -->
  <rect x="380" y="530" width="170" height="195" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="465" y="550" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2d2f33">Structural — 7</text>
  <text x="465" y="566" text-anchor="middle" font-size="9" fill="#2d2f33">Adapter</text>
  <text x="465" y="579" text-anchor="middle" font-size="9" fill="#2d2f33">Bridge</text>
  <text x="465" y="592" text-anchor="middle" font-size="9" fill="#2d2f33">Composite</text>
  <text x="465" y="605" text-anchor="middle" font-size="9" fill="#2d2f33">Decorator</text>
  <text x="465" y="618" text-anchor="middle" font-size="9" fill="#2d2f33">Facade</text>
  <text x="465" y="631" text-anchor="middle" font-size="9" fill="#2d2f33">Flyweight</text>
  <text x="465" y="644" text-anchor="middle" font-size="9" fill="#2d2f33">Proxy</text>

  <!-- Behavioral box (previously overflowed — last item sat 9px from the old bottom edge; height increase gives ~29px clearance) -->
  <rect x="570" y="530" width="200" height="195" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="670" y="550" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2d2f33">Behavioral — 11</text>
  <text x="670" y="566" text-anchor="middle" font-size="9" fill="#2d2f33">Observer</text>
  <text x="670" y="579" text-anchor="middle" font-size="9" fill="#2d2f33">Strategy</text>
  <text x="670" y="592" text-anchor="middle" font-size="9" fill="#2d2f33">Command</text>
  <text x="670" y="605" text-anchor="middle" font-size="9" fill="#2d2f33">State</text>
  <text x="670" y="618" text-anchor="middle" font-size="9" fill="#2d2f33">Chain of Responsibility</text>
  <text x="670" y="631" text-anchor="middle" font-size="9" fill="#2d2f33">Template Method</text>
  <text x="670" y="644" text-anchor="middle" font-size="9" fill="#2d2f33">Iterator</text>
  <text x="670" y="657" text-anchor="middle" font-size="9" fill="#2d2f33">Mediator</text>
  <text x="670" y="670" text-anchor="middle" font-size="9" fill="#2d2f33">Memento</text>
  <text x="670" y="683" text-anchor="middle" font-size="9" fill="#2d2f33">Visitor</text>
  <text x="670" y="696" text-anchor="middle" font-size="9" fill="#2d2f33">Interpreter</text>

  <line x1="360" y1="627" x2="380" y2="627" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#lpArrow)"/>
  <line x1="550" y1="627" x2="570" y2="627" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#lpArrow)"/>

  <!-- Capstones row (centered over both capstone boxes: 300 to 760, mid 530; shifted down 20px from the pattern-box row to keep clear of the two convergence arrows below) -->
  <text x="530" y="760" text-anchor="middle" font-size="12" font-weight="700" fill="#3b6ea5">Capstones — put it all together</text>

  <rect x="300" y="770" width="220" height="55" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="410" y="793" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">LLD Capstone</text>
  <text x="410" y="809" text-anchor="middle" font-size="9" fill="#eaf1f8">Parking Lot (best-fit design)</text>

  <rect x="540" y="770" width="220" height="55" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="650" y="793" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">HLD Capstone</text>
  <text x="650" y="809" text-anchor="middle" font-size="9" fill="#eaf1f8">Rate Limiter (token bucket)</text>

  <!--
    Converging arrows into capstones — routed as elbowed paths, not straight diagonals.
    A straight line from the Microservices box to the HLD Capstone box would cut directly
    through the Behavioral patterns box (verified: it would cross the box's top edge at
    x≈761 and its bottom edge at x≈680, slicing across all 11 pattern names). Both arrows
    now drop straight down in open space, run horizontally at y=745 — above the pattern
    boxes (which end at y=725) and above the "Capstones" label (which sits at y=760) — then
    turn down into their target box.
  -->
  <path d="M950,124 L950,745 L650,745 L650,768" fill="none" stroke="#3b6ea5" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#lpArrow)"/>
  <path d="M670,725 L670,745 L410,745 L410,768" fill="none" stroke="#3b6ea5" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#lpArrow)"/>

  <text x="520" y="845" text-anchor="middle" font-size="10" fill="#6a7178">Follow either track top-to-bottom, or interleave them — both roads lead to the same two capstones.</text>

  <title>Complete learning path: Core Principles feeds both an HLD track (7 topics) and an LLD track (OOP, SOLID, then all 23 design patterns), converging on an LLD capstone and an HLD capstone</title>
</svg>
