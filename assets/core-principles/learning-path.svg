  <text x="390" y="502" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2f33">SOLID</text>
  <text x="390" y="516" text-anchor="middle" font-size="9" fill="#6a7178">Principles</text>

  <line x1="310" y1="505" x2="330" y2="505" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#lpArrow)"/>
  <line x1="390" y1="530" x2="265" y2="550" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#lpArrow)"/>

