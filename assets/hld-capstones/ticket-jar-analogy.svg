<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">A rate limiter is a jar of ride tickets</text>

  <rect x="30" y="55" width="130" height="90" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="95" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Ticket jar</text>
  <text x="95" y="98" text-anchor="middle" font-size="9" fill="#6a7178">holds up to 5 tickets</text>
  <text x="95" y="114" text-anchor="middle" font-size="9" fill="#6a7178">2 new tickets drip</text>
  <text x="95" y="128" text-anchor="middle" font-size="9" fill="#6a7178">in every second</text>

  <line x1="160" y1="100" x2="220" y2="100" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="190" y="90" text-anchor="middle" font-size="9" fill="#6a7178">take one</text>

  <rect x="220" y="60" width="42" height="30" rx="4" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.3"/>
  <text x="241" y="80" text-anchor="middle" font-size="9" fill="#2f8f4e">ride 1</text>
  <rect x="270" y="60" width="42" height="30" rx="4" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.3"/>
  <text x="291" y="80" text-anchor="middle" font-size="9" fill="#2f8f4e">ride 2</text>
  <rect x="320" y="60" width="42" height="30" rx="4" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.3"/>
  <text x="341" y="80" text-anchor="middle" font-size="9" fill="#2f8f4e">ride 3</text>
  <rect x="370" y="60" width="42" height="30" rx="4" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.3"/>
  <text x="391" y="80" text-anchor="middle" font-size="9" fill="#2f8f4e">ride 4</text>
  <rect x="420" y="60" width="42" height="30" rx="4" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.3"/>
  <text x="441" y="80" text-anchor="middle" font-size="9" fill="#2f8f4e">ride 5</text>

  <rect x="480" y="60" width="55" height="30" rx="4" fill="#fdedec" stroke="#c0392b" stroke-width="1.3"/>
  <text x="507" y="80" text-anchor="middle" font-size="9" fill="#c0392b">no ticket!</text>

  <text x="345" y="120" text-anchor="middle" font-size="10" fill="#6a7178">5 friends ride right away — the 6th has to wait for a new ticket to drip in</text>

  <rect x="220" y="180" width="90" height="30" rx="4" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.3"/>
  <text x="265" y="200" text-anchor="middle" font-size="9" fill="#2f8f4e">a bit later...</text>
  <rect x="330" y="180" width="42" height="30" rx="4" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.3"/>
  <text x="351" y="200" text-anchor="middle" font-size="9" fill="#2f8f4e">ride 6</text>
  <rect x="380" y="180" width="42" height="30" rx="4" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.3"/>
  <text x="401" y="200" text-anchor="middle" font-size="9" fill="#2f8f4e">ride 7</text>

  <text x="325" y="240" text-anchor="middle" font-size="11" fill="#6a7178">No one can stockpile tickets faster than the jar refills —</text>
  <text x="325" y="256" text-anchor="middle" font-size="11" fill="#6a7178">that cap is exactly what stops one client from overwhelming the system.</text>

  <title>A rate limiter explained as a jar of ride tickets that refills at a fixed rate</title>
</svg>
