<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f8f4e"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="350" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#2f8f4e">Bus arrives, a Large spot is free</text>

  <rect x="30" y="45" width="90" height="40" rx="5" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="75" y="69" text-anchor="middle" font-size="11" fill="#2d2f33">Bus</text>

  <rect x="200" y="45" width="70" height="40" rx="5" fill="#f6f8fa" stroke="#9aa2ad" stroke-width="1.2"/>
  <text x="235" y="69" text-anchor="middle" font-size="10" fill="#9aa2ad">Small: full</text>
  <rect x="290" y="45" width="70" height="40" rx="5" fill="#f6f8fa" stroke="#9aa2ad" stroke-width="1.2"/>
  <text x="325" y="69" text-anchor="middle" font-size="10" fill="#9aa2ad">Medium: full</text>
  <rect x="380" y="45" width="70" height="40" rx="5" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="415" y="69" text-anchor="middle" font-size="10" fill="#2f8f4e">Large: free</text>

  <line x1="120" y1="65" x2="380" y2="65" stroke="#2f8f4e" stroke-width="1.4" marker-end="url(#arrow-green)"/>
  <text x="250" y="100" text-anchor="middle" font-size="10" fill="#2f8f4e">a Bus can only fit in a Large spot — assigned directly</text>

  <line x1="30" y1="130" x2="670" y2="130" stroke="#e3e6ea" stroke-width="1.2"/>

  <text x="350" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#c0392b">Bus arrives, only Small and Medium spots are free</text>

  <rect x="30" y="180" width="90" height="40" rx="5" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="75" y="204" text-anchor="middle" font-size="11" fill="#2d2f33">Bus</text>

  <rect x="200" y="180" width="70" height="40" rx="5" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.3"/>
  <text x="235" y="204" text-anchor="middle" font-size="10" fill="#2f8f4e">Small: free</text>
  <rect x="290" y="180" width="70" height="40" rx="5" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.3"/>
  <text x="325" y="204" text-anchor="middle" font-size="10" fill="#2f8f4e">Medium: free</text>
  <rect x="410" y="180" width="130" height="40" rx="5" fill="#fdedec" stroke="#c0392b" stroke-width="1.3"/>
  <text x="475" y="204" text-anchor="middle" font-size="10" fill="#c0392b">rejected: too big</text>

  <line x1="120" y1="200" x2="410" y2="200" stroke="#c0392b" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="330" y="240" text-anchor="middle" font-size="10" fill="#c0392b">free space isn't enough on its own — the space has to be the right size</text>

  <title>A bus is assigned a large spot when one is free, and rejected outright when only small or medium spots remain, even though space is technically available</title>
</svg>
