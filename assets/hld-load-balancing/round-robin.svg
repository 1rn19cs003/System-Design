<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="20" y="95" width="120" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="80" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Client</text>

  <rect x="230" y="95" width="140" height="60" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="300" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Load Balancer</text>
  <text x="300" y="140" text-anchor="middle" font-size="10" fill="#6a7178">round-robin</text>

  <rect x="500" y="20" width="120" height="50" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="560" y="50" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Backend 1</text>

  <rect x="500" y="105" width="120" height="50" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="560" y="135" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Backend 2</text>

  <rect x="500" y="190" width="120" height="50" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="560" y="220" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Backend 3</text>

  <line x1="140" y1="125" x2="230" y2="125" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="185" y="112" text-anchor="middle" font-size="10" fill="#6a7178">requests</text>

  <line x1="370" y1="112" x2="500" y2="45" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="470" y="50" text-anchor="middle" font-size="10" fill="#6a7178">req 1, 4, 7...</text>

  <line x1="370" y1="125" x2="500" y2="130" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="435" y="115" text-anchor="middle" font-size="10" fill="#6a7178">req 2, 5, 8...</text>

  <line x1="370" y1="138" x2="500" y2="215" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="480" y="222" text-anchor="middle" font-size="10" fill="#6a7178">req 3, 6, 9...</text>

  <title>Round-robin load balancing</title>
</svg>
