<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="280" height="220" rx="8" fill="#f6f8fa" stroke="#e3e6ea" stroke-width="1.2"/>
  <text x="160" y="45" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Monolith</text>

  <rect x="60" y="70" width="200" height="130" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="160" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">Orders</text>
  <text x="160" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">Payments</text>
  <text x="160" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">Inventory</text>
  <text x="160" y="185" text-anchor="middle" font-size="9" fill="#6a7178">one process, one deploy</text>

  <text x="160" y="222" text-anchor="middle" font-size="10" fill="#6a7178">calls between modules are in-process — no network hop</text>

  <rect x="340" y="20" width="280" height="220" rx="8" fill="#f6f8fa" stroke="#e3e6ea" stroke-width="1.2"/>
  <text x="480" y="45" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Microservices</text>

  <rect x="360" y="70" width="75" height="40" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="397" y="94" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2f33">Orders</text>

  <rect x="452" y="70" width="75" height="40" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="489" y="94" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2f33">Payments</text>

  <rect x="544" y="70" width="60" height="40" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="574" y="94" text-anchor="middle" font-size="9" font-weight="600" fill="#2d2f33">Inventory</text>

  <line x1="435" y1="90" x2="452" y2="90" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="527" y1="90" x2="544" y2="90" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>

  <text x="480" y="140" text-anchor="middle" font-size="9" fill="#6a7178">independently deployed</text>
  <text x="480" y="222" text-anchor="middle" font-size="10" fill="#6a7178">calls between services are real network hops</text>

  <title>Monolith vs. microservices: where a call actually goes</title>
</svg>
