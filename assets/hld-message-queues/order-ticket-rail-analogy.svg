<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">A message queue is the order-ticket rail</text>

  <rect x="20" y="100" width="120" height="60" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="80" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Waiter</text>
  <text x="80" y="144" text-anchor="middle" font-size="10" fill="#6a7178">takes the order</text>

  <rect x="230" y="90" width="150" height="80" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="305" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Ticket rail</text>
  <text x="305" y="138" text-anchor="middle" font-size="10" fill="#6a7178">holds tickets until</text>
  <text x="305" y="153" text-anchor="middle" font-size="10" fill="#6a7178">a cook is free</text>

  <rect x="510" y="20" width="130" height="48" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="575" y="40" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Cook A</text>
  <text x="575" y="56" text-anchor="middle" font-size="9" fill="#6a7178">grabs next ticket</text>

  <rect x="510" y="106" width="130" height="48" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="575" y="126" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Cook B</text>
  <text x="575" y="142" text-anchor="middle" font-size="9" fill="#6a7178">grabs next ticket</text>

  <rect x="510" y="192" width="130" height="48" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="575" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Cook C</text>
  <text x="575" y="228" text-anchor="middle" font-size="9" fill="#6a7178">grabs next ticket</text>

  <line x1="140" y1="130" x2="230" y2="130" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="185" y="118" text-anchor="middle" font-size="9" fill="#6a7178">pins ticket</text>

  <line x1="380" y1="112" x2="510" y2="45" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="380" y1="130" x2="510" y2="130" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="380" y1="148" x2="510" y2="217" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>

  <text x="445" y="265" text-anchor="middle" font-size="10" fill="#6a7178">whichever cook is free next takes the next ticket</text>

  <text x="305" y="285" text-anchor="middle" font-size="11" fill="#6a7178">The waiter never waits for food to be cooked — pin the ticket, move to the next table.</text>

  <title>A message queue explained as a restaurant's order-ticket rail between waiter and cooks</title>
</svg>
