<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="20" y="100" width="110" height="55" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="75" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Producer</text>

  <rect x="220" y="90" width="150" height="75" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="295" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Queue</text>
  <text x="295" y="138" text-anchor="middle" font-size="10" fill="#6a7178">holds messages</text>
  <text x="295" y="155" text-anchor="middle" font-size="10" fill="#6a7178">until picked up</text>

  <rect x="500" y="20" width="120" height="45" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="560" y="47" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Consumer 1</text>

  <rect x="500" y="105" width="120" height="45" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="560" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Consumer 2</text>

  <rect x="500" y="190" width="120" height="45" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="560" y="217" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Consumer 3</text>

  <line x1="130" y1="127" x2="220" y2="127" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="175" y="114" text-anchor="middle" font-size="10" fill="#6a7178">enqueue</text>

  <line x1="370" y1="110" x2="500" y2="45" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="370" y1="127" x2="500" y2="127" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="370" y1="145" x2="500" y2="212" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="435" y="192" text-anchor="middle" font-size="10" fill="#6a7178">each worker pulls the next message</text>

  <title>Producer, queue, and concurrent consumers</title>
</svg>
