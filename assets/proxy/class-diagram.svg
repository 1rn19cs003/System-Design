<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="hollow-arrow" markerWidth="14" markerHeight="12" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L12,5 L1,9 z" fill="#ffffff" stroke="#3b6ea5" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Image interface -->
  <rect x="220" y="20" width="200" height="70" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="320" y="40" text-anchor="middle" font-size="11" fill="#3b6ea5" font-style="italic">&#171;interface&#187;</text>
  <text x="320" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">Image</text>
  <line x1="220" y1="66" x2="420" y2="66" stroke="#3b6ea5" stroke-width="1"/>
  <text x="320" y="82" text-anchor="middle" font-size="12" fill="#2d2f33">+ display()</text>

  <!-- RealImage -->
  <rect x="60" y="200" width="220" height="110" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="170" y="222" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">RealImage</text>
  <line x1="60" y1="230" x2="280" y2="230" stroke="#3b6ea5" stroke-width="1"/>
  <text x="76" y="248" font-size="12" fill="#2d2f33">- filename: String</text>
  <line x1="60" y1="258" x2="280" y2="258" stroke="#3b6ea5" stroke-width="1"/>
  <text x="76" y="276" font-size="12" fill="#2d2f33">+ RealImage(filename)</text>
  <text x="76" y="294" font-size="12" fill="#2d2f33">+ display()</text>

  <!-- ProxyImage -->
  <rect x="360" y="200" width="240" height="130" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="480" y="222" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">ProxyImage</text>
  <line x1="360" y1="230" x2="600" y2="230" stroke="#3b6ea5" stroke-width="1"/>
  <text x="376" y="248" font-size="12" fill="#2d2f33">- filename: String</text>
  <text x="376" y="264" font-size="12" fill="#2d2f33">- realImage: RealImage</text>
  <line x1="360" y1="272" x2="600" y2="272" stroke="#3b6ea5" stroke-width="1"/>
  <text x="376" y="290" font-size="12" fill="#2d2f33">+ ProxyImage(filename)</text>
  <text x="376" y="308" font-size="12" fill="#2d2f33">+ display() — lazily creates</text>
  <text x="392" y="323" font-size="12" fill="#2d2f33">RealImage on first call</text>

  <!-- inheritance arrows to interface -->
  <line x1="170" y1="200" x2="280" y2="92" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>
  <line x1="480" y1="200" x2="360" y2="92" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>

  <!-- proxy holds/creates real image -->
  <line x1="360" y1="255" x2="280" y2="255" stroke="#3b6ea5" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="320" y="245" text-anchor="middle" font-size="11" fill="#6a7178">creates &amp; delegates</text>

  <!-- client -->
  <rect x="240" y="360" width="160" height="34" rx="6" fill="#f6f8fa" stroke="#e3e6ea" stroke-width="1.2"/>
  <text x="320" y="382" text-anchor="middle" font-size="12" fill="#2d2f33">Client code</text>
  <line x1="320" y1="360" x2="480" y2="330" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="440" y="352" text-anchor="middle" font-size="11" fill="#6a7178">holds &amp; calls</text>
</svg>
