<svg viewBox="0 0 640 340" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .box { fill: #ffffff; stroke: #3b6ea5; stroke-width: 1.5; }
    .title-bg { fill: #eaf1f8; }
    .title { font-size: 15px; font-weight: 600; fill: #2d2f33; }
    .line { fill: #2d2f33; font-size: 12.5px; }
    .divider { stroke: #3b6ea5; stroke-width: 1; }
    .arrow { stroke: #6a7178; stroke-width: 1.5; fill: none; }
    .label { font-size: 12px; fill: #6a7178; }
  </style>

  <!-- Singleton class box -->
  <rect x="180" y="20" width="280" height="180" rx="8" class="box"/>
  <rect x="180" y="20" width="280" height="34" rx="8" class="title-bg"/>
  <rect x="180" y="46" width="280" height="8" class="title-bg"/>
  <text x="320" y="42" text-anchor="middle" class="title">Singleton</text>
  <line x1="180" y1="54" x2="460" y2="54" class="divider"/>

  <text x="196" y="76" class="line">- static instance: Singleton</text>
  <text x="196" y="94" class="line">- requestCount: int</text>

  <line x1="180" y1="106" x2="460" y2="106" class="divider"/>

  <text x="196" y="128" class="line">- Singleton()  « private »</text>
  <text x="196" y="148" class="line">+ static getInstance(): Singleton</text>
  <text x="196" y="168" class="line">+ logRequest(): void</text>

  <!-- Client box -->
  <rect x="240" y="250" width="160" height="70" rx="8" class="box"/>
  <rect x="240" y="250" width="160" height="30" rx="8" class="title-bg"/>
  <rect x="240" y="272" width="160" height="8" class="title-bg"/>
  <text x="320" y="270" text-anchor="middle" class="title">Client</text>
  <line x1="240" y1="280" x2="400" y2="280" class="divider"/>
  <text x="256" y="300" class="line">+ doWork()</text>

  <!-- Arrow from Client to Singleton -->
  <line x1="320" y1="250" x2="320" y2="204" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="330" y="230" class="label">calls getInstance()</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#6a7178"/>
    </marker>
  </defs>
</svg>
