<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .box { fill: #ffffff; stroke: #3b6ea5; stroke-width: 1.5; }
    .title-bg { fill: #eaf1f8; }
    .title { font-size: 13px; font-weight: 600; fill: #2d2f33; }
    .line { fill: #2d2f33; font-size: 11px; }
    .divider { stroke: #3b6ea5; stroke-width: 1; }
    .arrow-hollow { stroke: #6a7178; stroke-width: 1.5; fill: none; }
    .bridge-line { stroke: #3b6ea5; stroke-width: 2; fill: none; }
    .label { font-size: 11px; fill: #6a7178; }
    .italic { font-style: italic; }
  </style>

  <!-- Abstraction side -->
  <rect x="30" y="30" width="200" height="60" rx="8" class="box"/>
  <rect x="30" y="30" width="200" height="26" rx="8" class="title-bg"/>
  <text x="130" y="48" text-anchor="middle" class="title italic">«abstract» Shape</text>
  <line x1="30" y1="56" x2="230" y2="56" class="divider"/>
  <text x="42" y="74" class="line">- renderer: Renderer</text>

  <rect x="10" y="150" width="110" height="40" rx="8" class="box"/>
  <text x="65" y="174" text-anchor="middle" class="title">Circle</text>
  <rect x="140" y="150" width="110" height="40" rx="8" class="box"/>
  <text x="195" y="174" text-anchor="middle" class="title">Square</text>

  <line x1="65" y1="150" x2="120" y2="93" class="arrow-hollow" marker-end="url(#hollow)"/>
  <line x1="195" y1="150" x2="140" y2="93" class="arrow-hollow" marker-end="url(#hollow)"/>

  <!-- Bridge connector -->
  <line x1="230" y1="60" x2="420" y2="60" class="bridge-line" marker-end="url(#diamond)"/>
  <text x="250" y="50" class="label">has-a (the "bridge")</text>

  <!-- Implementor side -->
  <rect x="420" y="30" width="230" height="60" rx="8" class="box"/>
  <rect x="420" y="30" width="230" height="26" rx="8" class="title-bg"/>
  <text x="535" y="48" text-anchor="middle" class="title italic">«interface» Renderer</text>
  <line x1="420" y1="56" x2="650" y2="56" class="divider"/>
  <text x="432" y="74" class="line italic">+ renderCircle/Square()</text>

  <rect x="400" y="150" width="130" height="40" rx="8" class="box"/>
  <text x="465" y="174" text-anchor="middle" class="title">OpenGLRenderer</text>
  <rect x="550" y="150" width="130" height="40" rx="8" class="box"/>
  <text x="615" y="174" text-anchor="middle" class="title">DirectXRenderer</text>

  <line x1="465" y1="150" x2="500" y2="93" class="arrow-hollow" marker-end="url(#hollow)"/>
  <line x1="615" y1="150" x2="560" y2="93" class="arrow-hollow" marker-end="url(#hollow)"/>

  <defs>
    <marker id="hollow" markerWidth="14" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 Z" fill="#ffffff" stroke="#6a7178" stroke-width="1.2"/>
    </marker>
    <marker id="diamond" markerWidth="12" markerHeight="10" refX="1" refY="5" orient="auto">
      <polygon points="0 5, 6 0, 12 5, 6 10" fill="#3b6ea5"/>
    </marker>
  </defs>

  <text x="350" y="250" text-anchor="middle" class="label">2 shapes × 2 renderers = 4 classes total (not 4 combination subclasses) — each side grows independently.</text>
</svg>
