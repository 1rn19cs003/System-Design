<svg viewBox="0 0 620 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="hollow-arrow" markerWidth="14" markerHeight="12" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L12,5 L1,9 z" fill="#ffffff" stroke="#3b6ea5" stroke-width="1"/>
    </marker>
  </defs>

  <rect x="30" y="40" width="200" height="90" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="130" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">Playlist</text>
  <line x1="30" y1="70" x2="230" y2="70" stroke="#3b6ea5" stroke-width="1"/>
  <text x="46" y="88" font-size="12" fill="#2d2f33">- songs: List&lt;String&gt;</text>
  <line x1="30" y1="96" x2="230" y2="96" stroke="#3b6ea5" stroke-width="1"/>
  <text x="46" y="114" font-size="12" fill="#2d2f33">+ createIterator()</text>

  <rect x="330" y="20" width="220" height="70" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="440" y="40" text-anchor="middle" font-size="11" fill="#3b6ea5" font-style="italic">&#171;interface&#187;</text>
  <text x="440" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">SongIterator</text>
  <line x1="330" y1="66" x2="550" y2="66" stroke="#3b6ea5" stroke-width="1"/>
  <text x="440" y="82" text-anchor="middle" font-size="12" fill="#2d2f33">+ hasNext() / + next()</text>

  <line x1="230" y1="75" x2="330" y2="55" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="280" y="55" text-anchor="middle" font-size="11" fill="#6a7178">creates</text>

  <rect x="330" y="160" width="240" height="90" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="450" y="182" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">PlaylistIterator</text>
  <line x1="330" y1="190" x2="570" y2="190" stroke="#3b6ea5" stroke-width="1"/>
  <text x="346" y="207" font-size="11" fill="#2d2f33">- songs, - position: int</text>
  <line x1="330" y1="214" x2="570" y2="214" stroke="#3b6ea5" stroke-width="1"/>
  <text x="346" y="232" font-size="11" fill="#2d2f33">+ hasNext() / + next()</text>

  <line x1="440" y1="160" x2="440" y2="90" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>

  <rect x="60" y="230" width="150" height="60" rx="6" fill="#f6f8fa" stroke="#e3e6ea" stroke-width="1.2"/>
  <text x="135" y="255" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Client code</text>
  <line x1="60" y1="263" x2="210" y2="263" stroke="#e3e6ea" stroke-width="1"/>
  <text x="76" y="280" font-size="10" fill="#2d2f33">while(iter.hasNext())</text>

  <line x1="135" y1="230" x2="330" y2="200" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="230" y="220" text-anchor="middle" font-size="11" fill="#6a7178">calls hasNext()/next()</text>
</svg>
