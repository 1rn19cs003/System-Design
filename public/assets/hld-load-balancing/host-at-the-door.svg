<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9aa2ad"/>
    </marker>
  </defs>

  <text x="360" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">A restaurant host is a load balancer</text>

  <rect x="20" y="110" width="130" height="60" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="85" y="136" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Customers</text>
  <text x="85" y="154" text-anchor="middle" font-size="10" fill="#6a7178">arrive hungry</text>

  <rect x="230" y="110" width="150" height="60" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="305" y="136" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Host at the door</text>
  <text x="305" y="154" text-anchor="middle" font-size="10" fill="#6a7178">picks the next table</text>

  <rect x="500" y="30" width="150" height="50" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="575" y="50" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Waiter A</text>
  <text x="575" y="66" text-anchor="middle" font-size="10" fill="#6a7178">table 1</text>

  <rect x="500" y="125" width="150" height="50" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="575" y="145" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Waiter B</text>
  <text x="575" y="161" text-anchor="middle" font-size="10" fill="#6a7178">table 2</text>

  <rect x="500" y="220" width="150" height="50" rx="6" fill="#f6f8fa" stroke="#9aa2ad" stroke-width="1.4" stroke-dasharray="4,3"/>
  <text x="575" y="240" text-anchor="middle" font-size="12" font-weight="600" fill="#6a7178">Waiter C</text>
  <text x="575" y="256" text-anchor="middle" font-size="10" fill="#6a7178">on break</text>

  <line x1="150" y1="140" x2="230" y2="140" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>

  <line x1="380" y1="128" x2="500" y2="60" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="380" y1="145" x2="500" y2="150" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="380" y1="160" x2="500" y2="240" stroke="#9aa2ad" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>

  <text x="430" y="86" text-anchor="middle" font-size="9" fill="#6a7178">1st, 4th, 7th...</text>
  <text x="410" y="200" text-anchor="middle" font-size="9" fill="#6a7178">2nd, 5th, 8th...</text>

  <text x="575" y="290" text-anchor="middle" font-size="10" fill="#9aa2ad">skipped until Waiter C is back (a health check)</text>

  <title>A restaurant host rotating customers to open tables, skipping any waiter on break</title>
</svg>
