<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="hollow-arrow" markerWidth="14" markerHeight="12" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L12,5 L1,9 z" fill="#ffffff" stroke="#3b6ea5" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Document (Context) -->
  <rect x="30" y="30" width="200" height="90" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="130" y="52" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">Document</text>
  <line x1="30" y1="60" x2="230" y2="60" stroke="#3b6ea5" stroke-width="1"/>
  <text x="46" y="78" font-size="12" fill="#2d2f33">- state: DocumentState</text>
  <line x1="30" y1="86" x2="230" y2="86" stroke="#3b6ea5" stroke-width="1"/>
  <text x="46" y="104" font-size="12" fill="#2d2f33">+ publish() / setState(s)</text>

  <!-- DocumentState interface -->
  <rect x="330" y="30" width="220" height="70" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="440" y="50" text-anchor="middle" font-size="11" fill="#3b6ea5" font-style="italic">&#171;interface&#187;</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">DocumentState</text>
  <line x1="330" y1="76" x2="550" y2="76" stroke="#3b6ea5" stroke-width="1"/>
  <text x="440" y="92" text-anchor="middle" font-size="12" fill="#2d2f33">+ publish(document)</text>

  <line x1="230" y1="70" x2="330" y2="65" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="280" y="60" text-anchor="middle" font-size="11" fill="#6a7178">delegates to</text>

  <!-- Concrete states -->
  <rect x="60" y="220" width="150" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="135" y="245" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">DraftState</text>
  <line x1="60" y1="253" x2="210" y2="253" stroke="#3b6ea5" stroke-width="1"/>
  <text x="76" y="270" font-size="11" fill="#2d2f33">+ publish()</text>

  <rect x="260" y="220" width="180" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="350" y="245" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">ModerationState</text>
  <line x1="260" y1="253" x2="440" y2="253" stroke="#3b6ea5" stroke-width="1"/>
  <text x="276" y="270" font-size="11" fill="#2d2f33">+ publish()</text>

  <rect x="480" y="220" width="170" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="565" y="245" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">PublishedState</text>
  <line x1="480" y1="253" x2="650" y2="253" stroke="#3b6ea5" stroke-width="1"/>
  <text x="496" y="270" font-size="11" fill="#2d2f33">+ publish()</text>

  <!-- implements arrows -->
  <line x1="135" y1="220" x2="400" y2="105" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>
  <line x1="350" y1="220" x2="430" y2="105" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>
  <line x1="565" y1="220" x2="460" y2="105" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>

  <!-- transitions -->
  <line x1="210" y1="250" x2="260" y2="250" stroke="#2f8f4e" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="235" y="240" text-anchor="middle" font-size="10" fill="#2f8f4e">publish()</text>
  <line x1="440" y1="250" x2="480" y2="250" stroke="#2f8f4e" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="460" y="240" text-anchor="middle" font-size="10" fill="#2f8f4e">publish()</text>

  <text x="340" y="340" text-anchor="middle" font-size="11" fill="#6a7178">Draft → Moderation → Published — each state calls document.setState(next) itself</text>
</svg>
