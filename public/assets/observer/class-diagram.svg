<svg viewBox="0 0 660 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="hollow-arrow" markerWidth="14" markerHeight="12" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L12,5 L1,9 z" fill="#ffffff" stroke="#3b6ea5" stroke-width="1"/>
    </marker>
  </defs>

  <!-- StockTicker (Subject) -->
  <rect x="40" y="30" width="230" height="130" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="155" y="52" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">StockTicker</text>
  <line x1="40" y1="60" x2="270" y2="60" stroke="#3b6ea5" stroke-width="1"/>
  <text x="56" y="78" font-size="12" fill="#2d2f33">- observers: List&lt;Observer&gt;</text>
  <text x="56" y="94" font-size="12" fill="#2d2f33">- price: double</text>
  <line x1="40" y1="102" x2="270" y2="102" stroke="#3b6ea5" stroke-width="1"/>
  <text x="56" y="120" font-size="12" fill="#2d2f33">+ attach(observer)</text>
  <text x="56" y="136" font-size="12" fill="#2d2f33">+ detach(observer)</text>
  <text x="56" y="152" font-size="12" fill="#2d2f33">+ setPrice(p) → notifyObservers()</text>

  <!-- StockObserver interface -->
  <rect x="400" y="30" width="220" height="70" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="510" y="50" text-anchor="middle" font-size="11" fill="#3b6ea5" font-style="italic">&#171;interface&#187;</text>
  <text x="510" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">StockObserver</text>
  <line x1="400" y1="76" x2="620" y2="76" stroke="#3b6ea5" stroke-width="1"/>
  <text x="510" y="92" text-anchor="middle" font-size="12" fill="#2d2f33">+ update(symbol, price)</text>

  <!-- notify arrow -->
  <line x1="270" y1="95" x2="400" y2="65" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="335" y="72" text-anchor="middle" font-size="11" fill="#6a7178">notifies</text>

  <!-- MobileDisplay -->
  <rect x="330" y="230" width="150" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="405" y="255" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">MobileDisplay</text>
  <line x1="330" y1="263" x2="480" y2="263" stroke="#3b6ea5" stroke-width="1"/>
  <text x="345" y="280" font-size="11" fill="#2d2f33">+ update(sym, p)</text>

  <!-- EmailAlert -->
  <rect x="500" y="230" width="150" height="70" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="575" y="252" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">EmailAlert</text>
  <line x1="500" y1="260" x2="650" y2="260" stroke="#3b6ea5" stroke-width="1"/>
  <text x="514" y="276" font-size="11" fill="#2d2f33">- threshold: double</text>
  <text x="514" y="290" font-size="11" fill="#2d2f33">+ update(sym, p)</text>

  <!-- implements arrows -->
  <line x1="405" y1="230" x2="480" y2="100" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>
  <line x1="575" y1="230" x2="520" y2="100" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>

  <!-- attach note -->
  <text x="155" y="200" text-anchor="middle" font-size="11" fill="#6a7178">ticker.attach(mobileDisplay)</text>
  <text x="155" y="216" text-anchor="middle" font-size="11" fill="#6a7178">ticker.attach(emailAlert)</text>
  <line x1="155" y1="160" x2="405" y2="230" stroke="#bfc4ca" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="155" y1="160" x2="575" y2="230" stroke="#bfc4ca" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
