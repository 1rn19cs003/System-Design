  <line x1="95" y1="90" x2="260" y2="140" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="310" y1="90" x2="310" y2="140" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="525" y1="90" x2="360" y2="140" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>

