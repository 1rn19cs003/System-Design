  <rect x="245" y="30" width="130" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="310" y="65" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Bob (User)</text>

  <rect x="460" y="30" width="130" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
