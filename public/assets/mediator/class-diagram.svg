  <text x="95" y="290" text-anchor="middle" font-size="11" fill="#2d2f33">receives via mediator</text>

  <rect x="460" y="260" width="130" height="50" rx="6" fill="#f6f8fa" stroke="#e3e6ea" stroke-width="1.2"/>
  <text x="525" y="290" text-anchor="middle" font-size="11" fill="#2d2f33">receives via mediator</text>

  <text x="310" y="330" text-anchor="middle" font-size="11" fill="#6a7178">Users never hold references to each other — only to ChatRoom</text>
