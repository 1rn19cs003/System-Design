<svg viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="20" y="90" width="160" height="90" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="100" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">TeamLead</text>
  <line x1="20" y1="123" x2="180" y2="123" stroke="#3b6ea5" stroke-width="1"/>
  <text x="36" y="140" font-size="11" fill="#2d2f33">handle(amount)</text>
  <text x="36" y="156" font-size="11" fill="#2d2f33">limit: $1,000</text>

  <rect x="260" y="90" width="160" height="90" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="340" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">Manager</text>
  <line x1="260" y1="123" x2="420" y2="123" stroke="#3b6ea5" stroke-width="1"/>
  <text x="276" y="140" font-size="11" fill="#2d2f33">handle(amount)</text>
  <text x="276" y="156" font-size="11" fill="#2d2f33">limit: $5,000</text>

  <rect x="500" y="90" width="160" height="90" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="580" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">Director</text>
  <line x1="500" y1="123" x2="660" y2="123" stroke="#3b6ea5" stroke-width="1"/>
  <text x="516" y="140" font-size="11" fill="#2d2f33">handle(amount)</text>
  <text x="516" y="156" font-size="11" fill="#2d2f33">limit: $20,000</text>

  <line x1="180" y1="135" x2="260" y2="135" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="220" y="127" text-anchor="middle" font-size="10" fill="#6a7178">next</text>
  <line x1="420" y1="135" x2="500" y2="135" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="460" y="127" text-anchor="middle" font-size="10" fill="#6a7178">next</text>

  <text x="340" y="60" text-anchor="middle" font-size="12" fill="#6a7178">Expense request enters at TeamLead, escalates until a handler's limit covers it</text>
  <line x1="60" y1="70" x2="60" y2="90" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="60" y="220" text-anchor="middle" font-size="11" fill="#6a7178">Request</text>
</svg>
