<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="175" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#c0392b">Checking every aisle (no index)</text>

  <rect x="20" y="55" width="80" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="60" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">You</text>

  <rect x="130" y="55" width="45" height="45" rx="4" fill="#f6f8fa" stroke="#9aa2ad" stroke-width="1.2"/>
  <text x="152" y="82" text-anchor="middle" font-size="10" fill="#6a7178">1</text>
  <rect x="185" y="55" width="45" height="45" rx="4" fill="#f6f8fa" stroke="#9aa2ad" stroke-width="1.2"/>
  <text x="207" y="82" text-anchor="middle" font-size="10" fill="#6a7178">2</text>
  <rect x="240" y="55" width="45" height="45" rx="4" fill="#f6f8fa" stroke="#9aa2ad" stroke-width="1.2"/>
  <text x="262" y="82" text-anchor="middle" font-size="10" fill="#6a7178">3</text>
  <rect x="295" y="55" width="45" height="45" rx="4" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="317" y="82" text-anchor="middle" font-size="10" fill="#2f8f4e">found!</text>

  <line x1="100" y1="77" x2="130" y2="77" stroke="#c0392b" stroke-width="1.3" marker-end="url(#arrow-red)"/>
  <line x1="175" y1="77" x2="185" y2="77" stroke="#c0392b" stroke-width="1.3" marker-end="url(#arrow-red)"/>
  <line x1="230" y1="77" x2="240" y2="77" stroke="#c0392b" stroke-width="1.3" marker-end="url(#arrow-red)"/>
  <line x1="285" y1="77" x2="295" y2="77" stroke="#c0392b" stroke-width="1.3" marker-end="url(#arrow-red)"/>

  <text x="175" y="130" text-anchor="middle" font-size="10" fill="#6a7178">every aisle checked in order until the book turns up</text>

  <line x1="350" y1="40" x2="350" y2="150" stroke="#e3e6ea" stroke-width="1.5"/>

  <text x="525" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#2f8f4e">Checking the card catalog (index)</text>

  <rect x="380" y="55" width="80" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="420" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">You</text>

  <rect x="500" y="55" width="100" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="550" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2f33">Card catalog</text>
  <text x="550" y="90" text-anchor="middle" font-size="9" fill="#6a7178">says: aisle 7</text>

  <rect x="640" y="55" width="45" height="45" rx="4" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="662" y="82" text-anchor="middle" font-size="10" fill="#2f8f4e">found!</text>

  <line x1="460" y1="77" x2="500" y2="77" stroke="#2f8f4e" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="600" y1="77" x2="640" y2="77" stroke="#2f8f4e" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="530" y="130" text-anchor="middle" font-size="10" fill="#6a7178">one lookup, straight to aisle 7 — no other aisle touched</text>

  <text x="350" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">A database index is the card catalog: it costs shelf space to maintain,</text>
  <text x="350" y="198" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">but turns "search everywhere" into "look up, then go straight there."</text>

  <title>An index explained as a library card catalog versus walking every aisle</title>
</svg>
