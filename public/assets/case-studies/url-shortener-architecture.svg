<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="usArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="20" y="120" width="110" height="55" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="75" y="151" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">Client</text>

  <rect x="175" y="120" width="120" height="55" rx="8" fill="#3b6ea5" stroke="#3b6ea5"/>
  <text x="235" y="151" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Load Balancer</text>

  <rect x="340" y="120" width="140" height="55" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="410" y="145" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">App Servers</text>
  <text x="410" y="160" text-anchor="middle" font-size="8.5" fill="#6a7178">stateless, horizontal</text>

  <line x1="130" y1="147" x2="175" y2="147" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#usArrow)"/>
  <line x1="295" y1="147" x2="340" y2="147" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#usArrow)"/>

  <rect x="540" y="25" width="150" height="60" rx="8" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="615" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#2f8f4e">Cache (Redis)</text>
  <text x="615" y="66" text-anchor="middle" font-size="8.5" fill="#2f8f4e">short → long, hot keys</text>

  <line x1="480" y1="135" x2="540" y2="60" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#usArrow)"/>
  <text x="500" y="95" font-size="8.5" fill="#2f8f4e">read: check first</text>

  <rect x="540" y="215" width="150" height="60" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="615" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">Database</text>
  <text x="615" y="256" text-anchor="middle" font-size="8.5" fill="#6a7178">sharded by short-code hash</text>

  <line x1="480" y1="160" x2="540" y2="235" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#usArrow)"/>
  <text x="490" y="200" font-size="8.5" fill="#6a7178">cache miss / write</text>

  <rect x="730" y="120" width="150" height="55" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="805" y="145" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">ID Generator</text>
  <text x="805" y="160" text-anchor="middle" font-size="8.5" fill="#6a7178">counter → base62</text>

  <line x1="690" y1="245" x2="805" y2="176" stroke="#c7ccd1" stroke-width="1.3" stroke-dasharray="3,3" marker-end="url(#usArrow)"/>
  <text x="690" y="200" font-size="8.5" fill="#6a7178">assigns new short codes</text>

  <text x="450" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#2d2f33">POST /shorten (write) and GET /{code} (read, ~100:1 read:write)</text>

  <title>URL shortener architecture: client through a load balancer to stateless app servers, which check a Redis cache first on reads and fall back to a sharded database, with an ID generator producing new base62 short codes on writes</title>
</svg>
