<svg viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .box { fill: #ffffff; stroke: #3b6ea5; stroke-width: 1.5; }
    .title-bg { fill: #eaf1f8; }
    .title { font-size: 12.5px; font-weight: 600; fill: #2d2f33; }
    .line { fill: #2d2f33; font-size: 10.5px; }
    .divider { stroke: #3b6ea5; stroke-width: 1; }
    .arrow { stroke: #6a7178; stroke-width: 1.5; fill: none; }
    .label { font-size: 11px; fill: #6a7178; }
    .italic { font-style: italic; }
  </style>

  <!-- Tree instances (extrinsic) -->
  <rect x="20" y="30" width="140" height="46" rx="6" class="box"/>
  <text x="90" y="50" text-anchor="middle" class="title">Tree (10,20)</text>
  <text x="90" y="66" text-anchor="middle" class="line italic">extrinsic: x,y</text>

  <rect x="20" y="90" width="140" height="46" rx="6" class="box"/>
  <text x="90" y="110" text-anchor="middle" class="title">Tree (30,40)</text>
  <text x="90" y="126" text-anchor="middle" class="line italic">extrinsic: x,y</text>

  <rect x="20" y="150" width="140" height="46" rx="6" class="box"/>
  <text x="90" y="170" text-anchor="middle" class="title">Tree (50,60)</text>
  <text x="90" y="186" text-anchor="middle" class="line italic">extrinsic: x,y</text>

  <!-- shared TreeType flyweights -->
  <rect x="380" y="40" width="240" height="70" rx="8" class="box"/>
  <rect x="380" y="40" width="240" height="26" rx="8" class="title-bg"/>
  <text x="500" y="58" text-anchor="middle" class="title">TreeType: Oak/Green/Rough</text>
  <line x1="380" y1="66" x2="620" y2="66" class="divider"/>
  <text x="392" y="84" class="line italic">intrinsic: name, color, texture</text>
  <text x="392" y="98" class="line">shared by 2 trees</text>

  <rect x="380" y="140" width="240" height="70" rx="8" class="box"/>
  <rect x="380" y="140" width="240" height="26" rx="8" class="title-bg"/>
  <text x="500" y="158" text-anchor="middle" class="title">TreeType: Pine/DarkGreen/Smooth</text>
  <line x1="380" y1="166" x2="620" y2="166" class="divider"/>
  <text x="392" y="184" class="line italic">intrinsic: name, color, texture</text>
  <text x="392" y="198" class="line">shared by 1 tree</text>

  <!-- FlyweightFactory in the middle -->
  <rect x="200" y="90" width="140" height="60" rx="8" class="box"/>
  <rect x="200" y="90" width="140" height="26" rx="8" class="title-bg"/>
  <text x="270" y="108" text-anchor="middle" class="title">TreeTypeFactory</text>
  <line x1="200" y1="116" x2="340" y2="116" class="divider"/>
  <text x="210" y="132" class="line">+ getTreeType(...)</text>

  <line x1="160" y1="53" x2="198" y2="105" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="160" y1="113" x2="198" y2="115" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="160" y1="173" x2="198" y2="130" class="arrow" marker-end="url(#arrowhead)"/>

  <line x1="340" y1="110" x2="378" y2="75" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="340" y1="125" x2="378" y2="175" class="arrow" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#6a7178"/>
    </marker>
  </defs>

  <text x="340" y="270" text-anchor="middle" class="label">3 Tree instances, only 2 TreeType flyweights created — the Oak type is shared, not duplicated.</text>
</svg>
