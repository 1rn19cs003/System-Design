<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <text x="160" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">One chef, one kitchen</text>

  <rect x="40" y="55" width="240" height="140" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="160" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">Solo chef</text>

  <rect x="60" y="95" width="60" height="35" rx="4" fill="#ffffff" stroke="#9aa2ad" stroke-width="1.2"/>
  <text x="90" y="116" text-anchor="middle" font-size="9" fill="#6a7178">grill</text>
  <rect x="140" y="95" width="60" height="35" rx="4" fill="#ffffff" stroke="#9aa2ad" stroke-width="1.2"/>
  <text x="170" y="116" text-anchor="middle" font-size="9" fill="#6a7178">salad</text>
  <rect x="220" y="95" width="40" height="35" rx="4" fill="#ffffff" stroke="#9aa2ad" stroke-width="1.2"/>
  <text x="240" y="116" text-anchor="middle" font-size="9" fill="#6a7178">dessert</text>

  <text x="160" y="150" text-anchor="middle" font-size="10" fill="#6a7178">same person, same station,</text>
  <text x="160" y="166" text-anchor="middle" font-size="10" fill="#6a7178">switches tasks in their head</text>
  <text x="160" y="182" text-anchor="middle" font-size="9" fill="#9aa2ad">(in-process function calls)</text>

  <line x1="350" y1="40" x2="350" y2="220" stroke="#e3e6ea" stroke-width="1.5"/>

  <text x="530" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Specialized stations</text>

  <rect x="400" y="55" width="90" height="45" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="445" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">Grill</text>

  <rect x="520" y="55" width="90" height="45" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="565" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">Salad</text>

  <rect x="640" y="55" width="50" height="45" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="665" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2f33">Dessert</text>

  <line x1="490" y1="77" x2="520" y2="77" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="610" y1="77" x2="640" y2="77" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>

  <text x="530" y="130" text-anchor="middle" font-size="10" fill="#6a7178">each station has its own cook and its own tools,</text>
  <text x="530" y="146" text-anchor="middle" font-size="10" fill="#6a7178">and passes the plate down the line to the next one</text>
  <text x="530" y="162" text-anchor="middle" font-size="9" fill="#9aa2ad">(real network calls between services)</text>

  <text x="350" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">More stations means more parallel work — but every plate</text>
  <text x="350" y="268" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">that visits three stations takes three real handoffs, not zero.</text>

  <title>Microservices explained as specialized kitchen stations versus one chef doing everything</title>
</svg>
