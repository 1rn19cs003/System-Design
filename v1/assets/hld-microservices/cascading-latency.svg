<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <text x="100" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Client</text>
  <line x1="100" y1="34" x2="100" y2="195" stroke="#c7ccd1" stroke-width="1.5"/>

  <text x="330" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Order Service</text>
  <line x1="330" y1="34" x2="330" y2="195" stroke="#c7ccd1" stroke-width="1.5"/>

  <text x="560" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Payment Service</text>
  <line x1="560" y1="34" x2="560" y2="155" stroke="#c7ccd1" stroke-width="1.5"/>

  <line x1="100" y1="60" x2="330" y2="60" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="215" y="50" text-anchor="middle" font-size="10" fill="#6a7178">1. place order</text>

  <line x1="330" y1="100" x2="560" y2="100" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="445" y="90" text-anchor="middle" font-size="10" fill="#6a7178">2. charge card</text>

  <line x1="560" y1="140" x2="330" y2="140" stroke="#3b6ea5" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="445" y="130" text-anchor="middle" font-size="10" fill="#6a7178">3. payment approved</text>

  <line x1="330" y1="180" x2="100" y2="180" stroke="#3b6ea5" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="215" y="170" text-anchor="middle" font-size="10" fill="#6a7178">4. order confirmed</text>

  <text x="330" y="222" text-anchor="middle" font-size="10" fill="#c0392b">Client's total latency includes the full Payment Service round trip (hops 2 + 3)</text>

  <title>Cascading latency across a service-to-service call chain</title>
</svg>
