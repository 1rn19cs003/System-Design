<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">The four pillars of OOP</text>

  <rect x="30" y="45" width="300" height="85" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="50" y="68" font-size="13" font-weight="600" fill="#2d2f33">Encapsulation</text>
  <text x="50" y="86" font-size="10" fill="#6a7178">Bundle data with the methods that</text>
  <text x="50" y="100" font-size="10" fill="#6a7178">act on it; hide the internals behind</text>
  <text x="50" y="114" font-size="10" fill="#6a7178">a small public interface.</text>

  <rect x="370" y="45" width="300" height="85" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="390" y="68" font-size="13" font-weight="600" fill="#2d2f33">Abstraction</text>
  <text x="390" y="86" font-size="10" fill="#6a7178">Expose only what a caller needs</text>
  <text x="390" y="100" font-size="10" fill="#6a7178">to know — the "what," never the</text>
  <text x="390" y="114" font-size="10" fill="#6a7178">"how it's implemented."</text>

  <rect x="30" y="150" width="300" height="85" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="50" y="173" font-size="13" font-weight="600" fill="#2d2f33">Inheritance</text>
  <text x="50" y="191" font-size="10" fill="#6a7178">A class reuses and extends the</text>
  <text x="50" y="205" font-size="10" fill="#6a7178">fields and methods of a more</text>
  <text x="50" y="219" font-size="10" fill="#6a7178">general parent class.</text>

  <rect x="370" y="150" width="300" height="85" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="390" y="173" font-size="13" font-weight="600" fill="#2d2f33">Polymorphism</text>
  <text x="390" y="191" font-size="10" fill="#6a7178">The same call behaves differently</text>
  <text x="390" y="205" font-size="10" fill="#6a7178">depending on the actual object</text>
  <text x="390" y="219" font-size="10" fill="#6a7178">behind the reference.</text>

  <title>The four pillars of object-oriented programming: encapsulation, abstraction, inheritance, and polymorphism</title>
</svg>
