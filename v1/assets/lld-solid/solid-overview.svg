<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">The five SOLID principles</text>

  <rect x="30" y="42" width="640" height="52" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="50" y="63" font-size="12" font-weight="700" fill="#3b6ea5">S — Single Responsibility</text>
  <text x="50" y="80" font-size="10.5" fill="#6a7178">A class should have exactly one reason to change.</text>

  <rect x="30" y="102" width="640" height="52" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="50" y="123" font-size="12" font-weight="700" fill="#3b6ea5">O — Open/Closed</text>
  <text x="50" y="140" font-size="10.5" fill="#6a7178">Open for extension, closed for modification — add behavior without editing existing code.</text>

  <rect x="30" y="162" width="640" height="52" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="50" y="183" font-size="12" font-weight="700" fill="#3b6ea5">L — Liskov Substitution</text>
  <text x="50" y="200" font-size="10.5" fill="#6a7178">A subclass must be usable anywhere its parent is expected, without breaking correctness.</text>

  <rect x="30" y="222" width="640" height="52" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="50" y="243" font-size="12" font-weight="700" fill="#3b6ea5">I — Interface Segregation</text>
  <text x="50" y="260" font-size="10.5" fill="#6a7178">Don't force a class to depend on methods it never uses — split fat interfaces into focused ones.</text>

  <rect x="30" y="282" width="640" height="52" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="50" y="303" font-size="12" font-weight="700" fill="#3b6ea5">D — Dependency Inversion</text>
  <text x="50" y="320" font-size="10.5" fill="#6a7178">Depend on abstractions, not concrete implementations — high-level code shouldn't know low-level details.</text>

  <title>The five SOLID principles: Single Responsibility, Open/Closed, Liskov Substitution, Interface Segregation, Dependency Inversion</title>
</svg>
