  <rect x="790" y="20" width="180" height="150" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="880" y="46" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2d2f33">Netflix / YouTube</text>
