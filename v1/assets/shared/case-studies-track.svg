<svg viewBox="0 0 1000 190" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <rect x="10" y="20" width="180" height="150" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
