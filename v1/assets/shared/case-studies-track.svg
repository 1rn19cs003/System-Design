  <text x="490" y="46" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2d2f33">WhatsApp</text>
  <text x="490" y="66" text-anchor="middle" font-size="9" fill="#6a7178">real-time delivery,</text>
  <text x="490" y="80" text-anchor="middle" font-size="9" fill="#6a7178">message ordering</text>

  <rect x="595" y="20" width="180" height="150" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="685" y="46" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2d2f33">Uber</text>
