  <rect x="205" y="20" width="180" height="150" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="295" y="46" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2d2f33">Twitter / X</text>
  <text x="295" y="66" text-anchor="middle" font-size="9" fill="#6a7178">feed generation,</text>
  <text x="295" y="80" text-anchor="middle" font-size="9" fill="#6a7178">fan-out trade-offs</text>

