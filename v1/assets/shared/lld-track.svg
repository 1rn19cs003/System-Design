<svg viewBox="0 0 1000 160" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="lldArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="lldArrowMuted" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6a7178"/>
    </marker>
  </defs>

  <rect x="20" y="40" width="180" height="70" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="110" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">1. OOP Fundamentals</text>
  <text x="110" y="87" text-anchor="middle" font-size="8.5" fill="#6a7178">encapsulation, inheritance,</text>
  <text x="110" y="99" text-anchor="middle" font-size="8.5" fill="#6a7178">polymorphism</text>

  <rect x="240" y="40" width="180" height="70" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="330" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">2. SOLID Principles</text>
  <text x="330" y="87" text-anchor="middle" font-size="8.5" fill="#6a7178">the 5 rules that keep</text>
  <text x="330" y="99" text-anchor="middle" font-size="8.5" fill="#6a7178">designs flexible</text>

  <rect x="460" y="30" width="180" height="90" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="550" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">3. Capstone</text>
  <text x="550" y="77" text-anchor="middle" font-size="8.5" fill="#eaf1f8">Parking Lot</text>
  <text x="550" y="90" text-anchor="middle" font-size="8.5" fill="#eaf1f8">(best-fit design)</text>
  <text x="550" y="103" text-anchor="middle" font-size="8.5" fill="#eaf1f8">using 1 &amp; 2 together</text>

  <line x1="200" y1="75" x2="240" y2="75" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#lldArrow)"/>
  <line x1="420" y1="75" x2="460" y2="75" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#lldArrow)"/>

  <rect x="700" y="45" width="270" height="60" rx="8" fill="#f4f6f8" stroke="#6a7178" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="835" y="70" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6a7178">Then: Design Patterns</text>
  <text x="835" y="86" text-anchor="middle" font-size="8.5" fill="#6a7178">23 reusable solutions built on OOP + SOLID</text>

  <line x1="640" y1="75" x2="700" y2="75" stroke="#6a7178" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#lldArrowMuted)"/>

  <text x="500" y="140" text-anchor="middle" font-size="10.5" fill="#6a7178">OOP and SOLID are the vocabulary — design patterns are that vocabulary applied to named, recurring problems</text>

  <title>LLD syllabus: OOP Fundamentals, then SOLID Principles, then a Parking Lot capstone combining both, with Design Patterns as the natural next step</title>
</svg>
