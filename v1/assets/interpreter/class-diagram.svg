<svg viewBox="0 0 620 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="hollow-arrow" markerWidth="14" markerHeight="12" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L12,5 L1,9 z" fill="#ffffff" stroke="#3b6ea5" stroke-width="1"/>
    </marker>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="200" y="20" width="220" height="60" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="310" y="40" text-anchor="middle" font-size="11" fill="#3b6ea5" font-style="italic">&#171;interface&#187;</text>
  <text x="310" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">Expression</text>
  <line x1="200" y1="66" x2="420" y2="66" stroke="#3b6ea5" stroke-width="1"/>
  <text x="310" y="76" text-anchor="middle" font-size="10" fill="#2d2f33">+ interpret(): int</text>

  <!-- tree for (5+3)-2 -->
  <rect x="200" y="140" width="220" height="50" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="310" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">SubtractExpression</text>

  <rect x="60" y="230" width="180" height="50" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="150" y="260" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">AddExpression</text>

  <rect x="440" y="230" width="140" height="50" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="510" y="260" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Number(2)</text>

  <rect x="10" y="300" width="120" height="36" rx="6" fill="#f6f8fa" stroke="#e3e6ea" stroke-width="1.2"/>
  <text x="70" y="323" text-anchor="middle" font-size="12" fill="#2d2f33">Number(5)</text>

  <rect x="150" y="300" width="120" height="36" rx="6" fill="#f6f8fa" stroke="#e3e6ea" stroke-width="1.2"/>
  <text x="210" y="323" text-anchor="middle" font-size="12" fill="#2d2f33">Number(3)</text>

  <line x1="310" y1="140" x2="310" y2="90" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>
  <line x1="150" y1="230" x2="260" y2="90" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>
  <line x1="510" y1="230" x2="360" y2="90" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>

  <line x1="260" y1="190" x2="150" y2="230" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="360" y1="190" x2="510" y2="230" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="120" y1="280" x2="80" y2="300" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="180" y1="280" x2="210" y2="300" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>

  <text x="310" y="115" text-anchor="middle" font-size="10" fill="#6a7178">implements</text>
  <text x="310" y="320" text-anchor="middle" font-size="11" fill="#6a7178">Tree for (5 + 3) - 2 — interpret() recurses bottom-up, yielding 6</text>
</svg>
