<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .box { fill: #ffffff; stroke: #3b6ea5; stroke-width: 1.5; }
    .title-bg { fill: #eaf1f8; }
    .title { font-size: 14px; font-weight: 600; fill: #2d2f33; }
    .line { fill: #2d2f33; font-size: 11.5px; }
    .divider { stroke: #3b6ea5; stroke-width: 1; }
    .arrow { stroke: #6a7178; stroke-width: 1.5; fill: none; }
    .label { font-size: 11.5px; fill: #6a7178; }
  </style>

  <!-- ComputerBuilder -->
  <rect x="30" y="30" width="270" height="200" rx="8" class="box"/>
  <rect x="30" y="30" width="270" height="30" rx="8" class="title-bg"/>
  <rect x="30" y="52" width="270" height="8" class="title-bg"/>
  <text x="165" y="50" text-anchor="middle" class="title">ComputerBuilder</text>
  <line x1="30" y1="60" x2="300" y2="60" class="divider"/>
  <text x="44" y="80" class="line">- cpu, ramGB, storageGB, hasGPU</text>
  <line x1="30" y1="92" x2="300" y2="92" class="divider"/>
  <text x="44" y="112" class="line">+ setCPU(cpu): ComputerBuilder</text>
  <text x="44" y="132" class="line">+ setRAM(gb): ComputerBuilder</text>
  <text x="44" y="152" class="line">+ setStorage(gb): ComputerBuilder</text>
  <text x="44" y="172" class="line">+ addGPU(): ComputerBuilder</text>
  <text x="44" y="200" class="line" font-weight="600">+ build(): Computer</text>

  <!-- Computer (product) -->
  <rect x="400" y="90" width="220" height="90" rx="8" class="box"/>
  <rect x="400" y="90" width="220" height="28" rx="8" class="title-bg"/>
  <rect x="400" y="110" width="220" height="8" class="title-bg"/>
  <text x="510" y="108" text-anchor="middle" class="title">Computer</text>
  <line x1="400" y1="118" x2="620" y2="118" class="divider"/>
  <text x="412" y="136" class="line">- cpu, ramGB, storageGB</text>
  <text x="412" y="154" class="line">- hasGPU</text>
  <text x="412" y="172" class="line" font-style="italic">(immutable once built)</text>

  <line x1="300" y1="180" x2="398" y2="150" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="320" y="160" class="label">.build() creates →</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#6a7178"/>
    </marker>
  </defs>

  <text x="320" y="270" text-anchor="middle" class="label">Chainable setters (each returns "this") let you skip whatever optional steps you don't need.</text>
</svg>
