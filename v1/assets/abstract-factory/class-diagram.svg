<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .box { fill: #ffffff; stroke: #3b6ea5; stroke-width: 1.5; }
    .title-bg { fill: #eaf1f8; }
    .title { font-size: 13px; font-weight: 600; fill: #2d2f33; }
    .line { fill: #2d2f33; font-size: 11px; }
    .divider { stroke: #3b6ea5; stroke-width: 1; }
    .arrow-hollow { stroke: #6a7178; stroke-width: 1.5; fill: none; }
    .label { font-size: 11px; fill: #6a7178; }
    .italic { font-style: italic; }
  </style>

  <!-- AbstractFactory -->
  <rect x="260" y="20" width="200" height="70" rx="8" class="box"/>
  <rect x="260" y="20" width="200" height="26" rx="8" class="title-bg"/>
  <rect x="260" y="38" width="200" height="8" class="title-bg"/>
  <text x="360" y="37" text-anchor="middle" class="title italic">«interface» UIFactory</text>
  <line x1="260" y1="46" x2="460" y2="46" class="divider"/>
  <text x="270" y="62" class="line italic">+ createButton(): Button</text>
  <text x="270" y="78" class="line italic">+ createCheckbox(): Checkbox</text>

  <!-- WindowsFactory -->
  <rect x="80" y="150" width="200" height="46" rx="8" class="box"/>
  <rect x="80" y="150" width="200" height="24" rx="8" class="title-bg"/>
  <rect x="80" y="166" width="200" height="8" class="title-bg"/>
  <text x="180" y="167" text-anchor="middle" class="title">WindowsFactory</text>
  <line x1="80" y1="174" x2="280" y2="174" class="divider"/>
  <text x="90" y="188" class="line">+ createButton/Checkbox()</text>

  <!-- MacFactory -->
  <rect x="420" y="150" width="200" height="46" rx="8" class="box"/>
  <rect x="420" y="150" width="200" height="24" rx="8" class="title-bg"/>
  <rect x="420" y="166" width="200" height="8" class="title-bg"/>
  <text x="520" y="167" text-anchor="middle" class="title">MacFactory</text>
  <line x1="420" y1="174" x2="620" y2="174" class="divider"/>
  <text x="430" y="188" class="line">+ createButton/Checkbox()</text>

  <line x1="180" y1="150" x2="330" y2="93" class="arrow-hollow" marker-end="url(#hollow)"/>
  <line x1="520" y1="150" x2="390" y2="93" class="arrow-hollow" marker-end="url(#hollow)"/>

  <!-- Windows product family -->
  <rect x="30" y="240" width="140" height="40" rx="8" class="box"/>
  <text x="100" y="264" text-anchor="middle" class="title">WindowsButton</text>
  <rect x="190" y="240" width="140" height="40" rx="8" class="box"/>
  <text x="260" y="264" text-anchor="middle" class="title">WindowsCheckbox</text>
  <line x1="150" y1="240" x2="180" y2="196" class="arrow-hollow" stroke-dasharray="4 3" marker-end="url(#open)"/>
  <line x1="260" y1="240" x2="180" y2="196" class="arrow-hollow" stroke-dasharray="4 3" marker-end="url(#open)"/>

  <!-- Mac product family -->
  <rect x="470" y="240" width="140" height="40" rx="8" class="box"/>
  <text x="540" y="264" text-anchor="middle" class="title">MacButton</text>
  <rect x="630" y="240" width="60" height="40" rx="8" class="box" style="display:none"/>
  <rect x="330" y="240" width="130" height="40" rx="8" class="box"/>
  <text x="395" y="264" text-anchor="middle" class="title">MacCheckbox</text>
  <line x1="540" y1="240" x2="520" y2="196" class="arrow-hollow" stroke-dasharray="4 3" marker-end="url(#open)"/>
  <line x1="395" y1="240" x2="520" y2="196" class="arrow-hollow" stroke-dasharray="4 3" marker-end="url(#open)"/>

  <defs>
    <marker id="hollow" markerWidth="14" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 Z" fill="#ffffff" stroke="#6a7178" stroke-width="1.2"/>
    </marker>
    <marker id="open" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#6a7178"/>
    </marker>
  </defs>

  <text x="350" y="340" text-anchor="middle" class="label">Each concrete factory produces its whole family — you can never get a Windows button paired with a Mac checkbox.</text>
</svg>
