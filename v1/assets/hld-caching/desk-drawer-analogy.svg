<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f8f4e"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9aa2ad"/>
    </marker>
  </defs>

  <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">A cache is just your desk drawer</text>

  <rect x="20" y="130" width="130" height="60" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="85" y="156" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">You</text>
  <text x="85" y="174" text-anchor="middle" font-size="10" fill="#6a7178">need a document</text>

  <rect x="280" y="130" width="140" height="60" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="350" y="156" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Desk drawer</text>
  <text x="350" y="174" text-anchor="middle" font-size="10" fill="#6a7178">the cache</text>

  <rect x="540" y="130" width="140" height="60" rx="8" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="610" y="156" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Filing room</text>
  <text x="610" y="174" text-anchor="middle" font-size="10" fill="#6a7178">down the hall (slow)</text>

  <line x1="150" y1="160" x2="280" y2="160" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="215" y="150" text-anchor="middle" font-size="10" fill="#6a7178">ask for it</text>

  <path d="M 350 130 C 350 80, 150 80, 150 128" fill="none" stroke="#2f8f4e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="250" y="75" text-anchor="middle" font-size="10" fill="#2f8f4e">hit: it's already in the drawer, hand it over</text>

  <path d="M 420 190 C 480 230, 560 230, 610 192" fill="none" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>
  <text x="515" y="245" text-anchor="middle" font-size="10" fill="#c0392b">miss: walk down the hall to get it</text>

  <path d="M 610 130 C 610 90, 420 60, 420 108" fill="none" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>
  <text x="515" y="70" text-anchor="middle" font-size="10" fill="#c0392b">then leave a copy in the drawer for next time</text>

  <text x="350" y="270" text-anchor="middle" font-size="11" fill="#6a7178">Same document, same request — the only difference is whether the drawer already had it.</text>

  <title>Caching explained as keeping a copy of a document in your desk drawer instead of walking to the filing room every time</title>
</svg>
