<svg viewBox="0 0 620 250" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="140" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="90" y="55" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">Client</text>

  <rect x="240" y="20" width="140" height="60" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="310" y="55" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">DNS Resolver</text>

  <rect x="460" y="20" width="140" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="530" y="55" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">Server</text>

  <line x1="90" y1="80" x2="90" y2="215" stroke="#c7ccd1" stroke-width="1.4" stroke-dasharray="3,3"/>
  <line x1="310" y1="80" x2="310" y2="175" stroke="#c7ccd1" stroke-width="1.4" stroke-dasharray="3,3"/>
  <line x1="530" y1="80" x2="530" y2="215" stroke="#c7ccd1" stroke-width="1.4" stroke-dasharray="3,3"/>

  <text x="200" y="115" text-anchor="middle" font-size="11" fill="#6a7178">1. resolve "api.example.com"</text>
  <line x1="90" y1="125" x2="310" y2="125" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="200" y="155" text-anchor="middle" font-size="11" fill="#6a7178">2. answer: 93.184.216.34</text>
  <line x1="310" y1="165" x2="90" y2="165" stroke="#3b6ea5" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <text x="310" y="195" text-anchor="middle" font-size="11" fill="#6a7178">3. connect directly to 93.184.216.34</text>
  <line x1="90" y1="205" x2="530" y2="205" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="90" y="230" text-anchor="middle" font-size="10" fill="#6a7178">Client</text>
  <text x="310" y="230" text-anchor="middle" font-size="10" fill="#6a7178">DNS Resolver</text>
  <text x="530" y="230" text-anchor="middle" font-size="10" fill="#6a7178">Server</text>

  <title>DNS resolution</title>
</svg>
