<svg viewBox="0 0 720 310" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <text x="360" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Ordering pizza by phone - the same steps as a web request</text>

  <rect x="20" y="55" width="140" height="60" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="90" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">You, hungry</text>
  <text x="90" y="100" text-anchor="middle" font-size="10" fill="#6a7178">want pizza</text>

  <rect x="200" y="55" width="140" height="60" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="270" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Your contacts</text>
  <text x="270" y="100" text-anchor="middle" font-size="10" fill="#6a7178">look up the number</text>

  <rect x="380" y="55" width="140" height="60" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="450" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Phone call</text>
  <text x="450" y="100" text-anchor="middle" font-size="10" fill="#6a7178">place the order</text>

  <rect x="560" y="55" width="140" height="60" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="630" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Tony's Kitchen</text>
  <text x="630" y="100" text-anchor="middle" font-size="10" fill="#6a7178">makes the pizza</text>

  <line x1="160" y1="85" x2="200" y2="85" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="340" y1="85" x2="380" y2="85" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="520" y1="85" x2="560" y2="85" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>

  <line x1="90" y1="115" x2="90" y2="160" stroke="#c7ccd1" stroke-width="1.3" stroke-dasharray="3,3"/>
  <line x1="270" y1="115" x2="270" y2="160" stroke="#c7ccd1" stroke-width="1.3" stroke-dasharray="3,3"/>
  <line x1="450" y1="115" x2="450" y2="160" stroke="#c7ccd1" stroke-width="1.3" stroke-dasharray="3,3"/>
  <line x1="630" y1="115" x2="630" y2="160" stroke="#c7ccd1" stroke-width="1.3" stroke-dasharray="3,3"/>

  <text x="90" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#3b6ea5">Client</text>
  <text x="270" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#3b6ea5">DNS resolver</text>
  <text x="450" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#3b6ea5">TCP + HTTP request</text>
  <text x="630" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#3b6ea5">Server</text>

  <text x="360" y="220" text-anchor="middle" font-size="11" fill="#6a7178">How long the call plus cooking takes = latency.</text>
  <text x="360" y="238" text-anchor="middle" font-size="11" fill="#6a7178">How many pizzas the kitchen finishes per hour = throughput.</text>
  <text x="360" y="266" text-anchor="middle" font-size="11" fill="#6a7178">A name ("Tony's Pizza") has to become a number (a phone number, or an IP address)</text>
  <text x="360" y="283" text-anchor="middle" font-size="11" fill="#6a7178">before anyone can actually connect.</text>

  <title>The client-server story, told as ordering pizza by phone</title>
</svg>
