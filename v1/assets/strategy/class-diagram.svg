<svg viewBox="0 0 660 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="hollow-arrow" markerWidth="14" markerHeight="12" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L12,5 L1,9 z" fill="#ffffff" stroke="#3b6ea5" stroke-width="1"/>
    </marker>
  </defs>

  <!-- ShoppingCart (Context) -->
  <rect x="30" y="150" width="200" height="90" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="130" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">ShoppingCart</text>
  <line x1="30" y1="180" x2="230" y2="180" stroke="#3b6ea5" stroke-width="1"/>
  <text x="46" y="198" font-size="12" fill="#2d2f33">- strategy: PaymentStrategy</text>
  <line x1="30" y1="206" x2="230" y2="206" stroke="#3b6ea5" stroke-width="1"/>
  <text x="46" y="224" font-size="12" fill="#2d2f33">+ setPaymentStrategy(s)</text>
  <text x="46" y="236" font-size="12" fill="#2d2f33">+ checkout(amount)</text>

  <!-- PaymentStrategy interface -->
  <rect x="330" y="150" width="230" height="70" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="445" y="170" text-anchor="middle" font-size="11" fill="#3b6ea5" font-style="italic">&#171;interface&#187;</text>
  <text x="445" y="188" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">PaymentStrategy</text>
  <line x1="330" y1="196" x2="560" y2="196" stroke="#3b6ea5" stroke-width="1"/>
  <text x="445" y="212" text-anchor="middle" font-size="12" fill="#2d2f33">+ pay(amount)</text>

  <!-- holds arrow -->
  <line x1="230" y1="185" x2="330" y2="185" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="280" y="177" text-anchor="middle" font-size="11" fill="#6a7178">holds</text>

  <!-- concrete strategies -->
  <rect x="30" y="290" width="170" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="115" y="316" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">CreditCardPayment</text>
  <line x1="30" y1="324" x2="200" y2="324" stroke="#3b6ea5" stroke-width="1"/>
  <text x="46" y="340" font-size="11" fill="#2d2f33">+ pay(amount)</text>

  <rect x="245" y="290" width="150" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="320" y="316" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">PayPalPayment</text>
  <line x1="245" y1="324" x2="395" y2="324" stroke="#3b6ea5" stroke-width="1"/>
  <text x="261" y="340" font-size="11" fill="#2d2f33">+ pay(amount)</text>

  <rect x="440" y="290" width="180" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="530" y="316" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">StoreCreditPayment</text>
  <line x1="440" y1="324" x2="620" y2="324" stroke="#3b6ea5" stroke-width="1"/>
  <text x="456" y="340" font-size="11" fill="#2d2f33">+ pay(amount)</text>

  <!-- implements arrows -->
  <line x1="115" y1="290" x2="400" y2="215" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>
  <line x1="320" y1="290" x2="440" y2="215" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>
  <line x1="530" y1="290" x2="480" y2="215" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>
</svg>
