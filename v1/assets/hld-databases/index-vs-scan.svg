<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="arrow-good" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f8f4e"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="280" height="220" rx="8" fill="#f6f8fa" stroke="#e3e6ea" stroke-width="1.2"/>
  <text x="160" y="45" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">No index — linear scan</text>

  <rect x="40" y="70" width="34" height="26" fill="#ffffff" stroke="#c7ccd1" stroke-width="1"/>
  <rect x="74" y="70" width="34" height="26" fill="#ffffff" stroke="#c7ccd1" stroke-width="1"/>
  <rect x="108" y="70" width="34" height="26" fill="#ffffff" stroke="#c7ccd1" stroke-width="1"/>
  <rect x="142" y="70" width="34" height="26" fill="#ffffff" stroke="#c7ccd1" stroke-width="1"/>
  <rect x="176" y="70" width="34" height="26" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.5"/>
  <rect x="210" y="70" width="34" height="26" fill="#ffffff" stroke="#c7ccd1" stroke-width="1"/>
  <rect x="244" y="70" width="34" height="26" fill="#ffffff" stroke="#c7ccd1" stroke-width="1"/>
  <text x="193" y="88" text-anchor="middle" font-size="10" fill="#2f8f4e" font-weight="600">match</text>

  <line x1="57" y1="115" x2="261" y2="115" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="160" y="132" text-anchor="middle" font-size="10" fill="#6a7178">checks every row in order</text>

  <text x="160" y="165" text-anchor="middle" font-size="11" fill="#6a7178">time grows with table size</text>
  <text x="160" y="183" text-anchor="middle" font-size="11" fill="#6a7178">O(n) per lookup</text>

  <rect x="340" y="20" width="280" height="220" rx="8" fill="#f6f8fa" stroke="#e3e6ea" stroke-width="1.2"/>
  <text x="480" y="45" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">With index — hash/B-tree</text>

  <rect x="360" y="70" width="90" height="40" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="405" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">Index</text>

  <rect x="530" y="70" width="70" height="40" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.5"/>
  <text x="565" y="94" text-anchor="middle" font-size="10" font-weight="600" fill="#2f8f4e">match</text>

  <line x1="450" y1="90" x2="530" y2="90" stroke="#2f8f4e" stroke-width="1.4" marker-end="url(#arrow-good)"/>
  <text x="490" y="132" text-anchor="middle" font-size="10" fill="#6a7178">jumps straight to the row</text>

  <text x="480" y="165" text-anchor="middle" font-size="11" fill="#6a7178">time barely changes with table size</text>
  <text x="480" y="183" text-anchor="middle" font-size="11" fill="#6a7178">O(log n) or O(1) per lookup</text>

  <title>Linear scan vs. indexed lookup</title>
</svg>
