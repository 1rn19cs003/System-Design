<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="nfArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <text x="220" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#2d2f33">Upload path (happens once, offline)</text>

  <rect x="20" y="40" width="120" height="50" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="80" y="69" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Raw upload</text>

  <line x1="140" y1="65" x2="175" y2="65" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#nfArrow)"/>

  <rect x="180" y="40" width="130" height="50" rx="8" fill="#3b6ea5" stroke="#3b6ea5"/>
  <text x="245" y="62" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Transcoding</text>
  <text x="245" y="76" text-anchor="middle" font-size="8" fill="#eaf1f8">many resolutions/bitrates</text>

  <line x1="310" y1="65" x2="345" y2="65" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#nfArrow)"/>

  <rect x="350" y="40" width="140" height="50" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="420" y="62" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2f33">Object storage</text>
  <text x="420" y="76" text-anchor="middle" font-size="8" fill="#6a7178">chunks, per bitrate</text>

  <line x1="490" y1="65" x2="525" y2="65" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#nfArrow)"/>

  <rect x="530" y="40" width="130" height="50" rx="8" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="595" y="62" text-anchor="middle" font-size="10" font-weight="600" fill="#2f8f4e">Push to CDN</text>
  <text x="595" y="76" text-anchor="middle" font-size="8" fill="#2f8f4e">pre-positioned at edges</text>

  <line x1="450" y1="105" x2="450" y2="130" stroke="#e3e6ea" stroke-width="1"/>
  <line x1="20" y1="118" x2="880" y2="118" stroke="#e3e6ea" stroke-width="1"/>

  <text x="220" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#2d2f33">Playback path (happens every view, real-time)</text>

  <rect x="20" y="170" width="130" height="50" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="85" y="199" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Viewer's device</text>

  <line x1="150" y1="195" x2="185" y2="195" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#nfArrow)"/>

  <rect x="190" y="170" width="150" height="50" rx="8" fill="#3b6ea5" stroke="#3b6ea5"/>
  <text x="265" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Nearest CDN edge</text>
  <text x="265" y="206" text-anchor="middle" font-size="8" fill="#eaf1f8">serves chunk directly</text>

  <line x1="265" y1="220" x2="265" y2="250" stroke="#c7ccd1" stroke-width="1.3" stroke-dasharray="3,3"/>
  <text x="265" y="265" text-anchor="middle" font-size="8.5" fill="#6a7178">on a cache miss only,</text>
  <text x="265" y="278" text-anchor="middle" font-size="8.5" fill="#6a7178">falls back to origin storage</text>

  <rect x="500" y="170" width="180" height="50" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="590" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2f33">Adaptive bitrate</text>
  <text x="590" y="206" text-anchor="middle" font-size="8" fill="#6a7178">client picks quality per chunk</text>

  <line x1="340" y1="195" x2="500" y2="195" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#nfArrow)"/>

  <title>Netflix architecture: an offline upload path transcodes raw video into many bitrates and pushes chunks to CDN edge servers; the real-time playback path serves each chunk from the nearest CDN edge, with the client's adaptive bitrate logic choosing quality per chunk based on current network conditions</title>
</svg>
