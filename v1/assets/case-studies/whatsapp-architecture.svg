<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="waArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="20" y="110" width="110" height="55" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="75" y="135" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Sender's</text>
  <text x="75" y="150" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">phone</text>

  <rect x="180" y="110" width="130" height="55" rx="8" fill="#3b6ea5" stroke="#3b6ea5"/>
  <text x="245" y="132" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">Chat Server A</text>
  <text x="245" y="147" text-anchor="middle" font-size="8.5" fill="#eaf1f8">holds sender's connection</text>

  <line x1="130" y1="137" x2="180" y2="137" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#waArrow)"/>
  <text x="155" y="128" text-anchor="middle" font-size="8" fill="#6a7178">persistent</text>
  <text x="155" y="160" text-anchor="middle" font-size="8" fill="#6a7178">socket</text>

  <rect x="360" y="110" width="140" height="55" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="430" y="132" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Message Store</text>
  <text x="430" y="147" text-anchor="middle" font-size="8.5" fill="#6a7178">per-user mailbox queue</text>

  <line x1="310" y1="137" x2="360" y2="137" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#waArrow)"/>

  <rect x="550" y="110" width="130" height="55" rx="8" fill="#3b6ea5" stroke="#3b6ea5"/>
  <text x="615" y="132" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">Chat Server B</text>
  <text x="615" y="147" text-anchor="middle" font-size="8.5" fill="#eaf1f8">holds receiver's connection</text>

  <line x1="500" y1="137" x2="550" y2="137" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#waArrow)"/>

  <rect x="730" y="60" width="110" height="55" rx="8" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="785" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#2f8f4e">Receiver</text>
  <text x="785" y="96" text-anchor="middle" font-size="8" fill="#2f8f4e">online: instant push</text>

  <line x1="680" y1="130" x2="730" y2="95" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#waArrow)"/>

  <rect x="730" y="170" width="110" height="55" rx="8" fill="#fdedec" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="785" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#c0392b">Receiver</text>
  <text x="785" y="206" text-anchor="middle" font-size="8" fill="#c0392b">offline: held in mailbox,</text>
  <text x="785" y="217" text-anchor="middle" font-size="8" fill="#c0392b">push notification sent</text>

  <line x1="680" y1="145" x2="730" y2="190" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#waArrow)"/>

  <text x="450" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#2d2f33">Store-and-forward: every message is durably queued before delivery is attempted</text>

  <text x="450" y="255" text-anchor="middle" font-size="10.5" fill="#6a7178">Sender and receiver are usually connected to different chat servers —</text>
  <text x="450" y="271" text-anchor="middle" font-size="10.5" fill="#6a7178">the message store is what makes delivery, retries, and offline receivers possible</text>

  <title>WhatsApp message flow: sender's phone holds a persistent connection to Chat Server A, which durably stores the message before forwarding to Chat Server B (holding the receiver's connection), which delivers instantly if the receiver is online or queues it with a push notification if offline</title>
</svg>
