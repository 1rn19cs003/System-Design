<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="ubArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="20" y="40" width="140" height="55" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="90" y="62" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Driver apps</text>
  <text x="90" y="77" text-anchor="middle" font-size="8.5" fill="#6a7178">GPS ping every ~4s</text>

  <line x1="160" y1="67" x2="200" y2="67" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#ubArrow)"/>

  <rect x="205" y="40" width="150" height="55" rx="8" fill="#3b6ea5" stroke="#3b6ea5"/>
  <text x="280" y="62" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">Location Service</text>
  <text x="280" y="77" text-anchor="middle" font-size="8.5" fill="#eaf1f8">ingest &amp; write path</text>

  <line x1="280" y1="95" x2="280" y2="125" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#ubArrow)"/>

  <rect x="180" y="130" width="200" height="60" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="280" y="153" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Geospatial Index</text>
  <text x="280" y="168" text-anchor="middle" font-size="8.5" fill="#6a7178">geohash / quadtree grid</text>
  <text x="280" y="181" text-anchor="middle" font-size="8.5" fill="#6a7178">cell → available drivers</text>

  <rect x="20" y="215" width="140" height="55" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="90" y="237" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Rider app</text>
  <text x="90" y="252" text-anchor="middle" font-size="8.5" fill="#6a7178">requests a ride</text>

  <line x1="160" y1="242" x2="580" y2="242" stroke="#3b6ea5" stroke-width="1.3"/>
  <line x1="580" y1="242" x2="580" y2="190" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#ubArrow)"/>

  <rect x="500" y="130" width="160" height="60" rx="8" fill="#3b6ea5" stroke="#3b6ea5"/>
  <text x="580" y="153" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">Matching Service</text>
  <text x="580" y="168" text-anchor="middle" font-size="8.5" fill="#eaf1f8">queries nearby cells,</text>
  <text x="580" y="181" text-anchor="middle" font-size="8.5" fill="#eaf1f8">ranks by ETA</text>

  <line x1="500" y1="160" x2="380" y2="160" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#ubArrow)"/>

  <rect x="700" y="130" width="170" height="60" rx="8" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="785" y="153" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2f8f4e">Best-match driver</text>
  <text x="785" y="168" text-anchor="middle" font-size="8.5" fill="#2f8f4e">offered the trip,</text>
  <text x="785" y="181" text-anchor="middle" font-size="8.5" fill="#2f8f4e">assigned on accept</text>

  <line x1="660" y1="160" x2="700" y2="160" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#ubArrow)"/>

  <text x="450" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#2d2f33">Two paths meet in the geospatial index: constant location writes, occasional match reads</text>

  <title>Uber architecture: driver apps continuously write location updates into a location service that maintains a geospatial index (geohash/quadtree), which a matching service queries when a rider requests a trip to find and rank nearby available drivers</title>
</svg>
