<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="hollow-arrow" markerWidth="14" markerHeight="12" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L12,5 L1,9 z" fill="#ffffff" stroke="#3b6ea5" stroke-width="1"/>
    </marker>
  </defs>

  <rect x="30" y="30" width="220" height="70" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="140" y="50" text-anchor="middle" font-size="11" fill="#3b6ea5" font-style="italic">&#171;interface&#187;</text>
  <text x="140" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">ItemElement</text>
  <line x1="30" y1="76" x2="250" y2="76" stroke="#3b6ea5" stroke-width="1"/>
  <text x="140" y="92" text-anchor="middle" font-size="12" fill="#2d2f33">+ accept(visitor)</text>

  <rect x="30" y="160" width="150" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="105" y="185" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Book</text>
  <line x1="30" y1="193" x2="180" y2="193" stroke="#3b6ea5" stroke-width="1"/>
  <text x="46" y="210" font-size="11" fill="#2d2f33">accept() → visitor.visit(this)</text>

  <rect x="220" y="160" width="180" height="60" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="310" y="185" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Electronic</text>
  <line x1="220" y1="193" x2="400" y2="193" stroke="#3b6ea5" stroke-width="1"/>
  <text x="236" y="210" font-size="11" fill="#2d2f33">accept() → visitor.visit(this)</text>

  <line x1="105" y1="160" x2="130" y2="100" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>
  <line x1="310" y1="160" x2="170" y2="100" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>

  <rect x="450" y="30" width="220" height="90" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="560" y="50" text-anchor="middle" font-size="11" fill="#3b6ea5" font-style="italic">&#171;interface&#187;</text>
  <text x="560" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">ShoppingCartVisitor</text>
  <line x1="450" y1="76" x2="670" y2="76" stroke="#3b6ea5" stroke-width="1"/>
  <text x="560" y="92" text-anchor="middle" font-size="11" fill="#2d2f33">+ visit(Book)</text>
  <text x="560" y="108" text-anchor="middle" font-size="11" fill="#2d2f33">+ visit(Electronic)</text>

  <rect x="450" y="180" width="220" height="70" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="560" y="205" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">PricingVisitor</text>
  <line x1="450" y1="213" x2="670" y2="213" stroke="#3b6ea5" stroke-width="1"/>
  <text x="466" y="230" font-size="11" fill="#2d2f33">visit(Book): no tax</text>
  <text x="466" y="244" font-size="11" fill="#2d2f33">visit(Electronic): +8% tax</text>

  <line x1="560" y1="180" x2="560" y2="120" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>

  <line x1="180" y1="185" x2="450" y2="90" stroke="#3b6ea5" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="220" y1="200" x2="450" y2="105" stroke="#3b6ea5" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <text x="340" y="300" text-anchor="middle" font-size="11" fill="#6a7178">accept() calls back into visit() — double dispatch picks the right overload for each element type</text>
</svg>
