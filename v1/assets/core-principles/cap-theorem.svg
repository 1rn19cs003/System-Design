<svg viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <text x="320" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#2d2f33">CAP: during a network partition, pick two</text>

  <polygon points="320,55 90,340 550,340" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.6"/>

  <circle cx="320" cy="55" r="5" fill="#3b6ea5"/>
  <text x="320" y="42" text-anchor="middle" font-size="12" font-weight="700" fill="#2d2f33">Consistency</text>
  <text x="320" y="98" text-anchor="middle" font-size="9.5" fill="#6a7178">every read sees the</text>
  <text x="320" y="112" text-anchor="middle" font-size="9.5" fill="#6a7178">latest write</text>

  <circle cx="90" cy="340" r="5" fill="#3b6ea5"/>
  <text x="90" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#2d2f33">Availability</text>
  <text x="90" y="382" text-anchor="middle" font-size="9.5" fill="#6a7178">every request gets a response</text>

  <circle cx="550" cy="340" r="5" fill="#3b6ea5"/>
  <text x="550" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#2d2f33">Partition tolerance</text>
  <text x="550" y="382" text-anchor="middle" font-size="9.5" fill="#6a7178">keeps working despite</text>
  <text x="550" y="396" text-anchor="middle" font-size="9.5" fill="#6a7178">dropped network links</text>

  <rect x="235" y="170" width="170" height="80" rx="8" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="320" y="195" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Real networks partition,</text>
  <text x="320" y="211" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">so P is not optional —</text>
  <text x="320" y="230" text-anchor="middle" font-size="10.5" fill="#6a7178">the real choice is</text>
  <text x="320" y="245" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3b6ea5">C or A, not both</text>

  <title>The CAP triangle: consistency, availability, partition tolerance — a real distributed system must keep working through partitions, so it is really a choice between consistency and availability</title>
</svg>
