<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="280" height="220" rx="8" fill="#fdedec" stroke="#f3bcb8" stroke-width="1.2"/>
  <text x="160" y="45" text-anchor="middle" font-size="12" font-weight="600" fill="#c0392b">No partitioning</text>

  <rect x="45" y="65" width="70" height="30" rx="5" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="80" y="85" text-anchor="middle" font-size="9" fill="#2d2f33">user-1 msg A</text>

  <rect x="125" y="65" width="70" height="30" rx="5" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="160" y="85" text-anchor="middle" font-size="9" fill="#2d2f33">user-1 msg B</text>

  <line x1="80" y1="95" x2="70" y2="140" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="160" y1="95" x2="230" y2="140" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="35" y="145" width="70" height="34" rx="5" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="70" y="166" text-anchor="middle" font-size="9" font-weight="600" fill="#2d2f33">Worker 1</text>

  <rect x="195" y="145" width="70" height="34" rx="5" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="230" y="166" text-anchor="middle" font-size="9" font-weight="600" fill="#2d2f33">Worker 2</text>

  <text x="160" y="208" text-anchor="middle" font-size="10" fill="#c0392b">msg B can finish before msg A</text>

  <rect x="340" y="20" width="280" height="220" rx="8" fill="#eef8f0" stroke="#bfe3c6" stroke-width="1.2"/>
  <text x="480" y="45" text-anchor="middle" font-size="12" font-weight="600" fill="#2f8f4e">Partitioned by key</text>

  <rect x="365" y="65" width="70" height="30" rx="5" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="400" y="85" text-anchor="middle" font-size="9" fill="#2d2f33">user-1 msg A</text>

  <rect x="445" y="65" width="70" height="30" rx="5" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="480" y="85" text-anchor="middle" font-size="9" fill="#2d2f33">user-1 msg B</text>

  <line x1="400" y1="95" x2="440" y2="140" stroke="#2f8f4e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="480" y1="95" x2="440" y2="140" stroke="#2f8f4e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="405" y="145" width="70" height="34" rx="5" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="440" y="166" text-anchor="middle" font-size="9" font-weight="600" fill="#2d2f33">Worker 1</text>

  <text x="480" y="208" text-anchor="middle" font-size="10" fill="#2f8f4e">same key, same worker — order preserved</text>

  <title>Ordering: unpartitioned vs. partitioned by key</title>
</svg>
