<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="sagaArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="sagaArrowBad" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect x="290" y="14" width="120" height="42" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="350" y="34" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">Saga Orchestrator</text>
  <text x="350" y="48" text-anchor="middle" font-size="8" fill="#eaf1f8">calls each step, tracks progress</text>

  <rect x="30" y="120" width="120" height="48" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="90" y="141" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2f8f4e">1. Reserve</text>
  <text x="90" y="156" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2f8f4e">Inventory ✓</text>

  <rect x="200" y="120" width="120" height="48" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="260" y="141" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2f8f4e">2. Charge</text>
  <text x="260" y="156" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2f8f4e">Payment ✓</text>

  <rect x="370" y="120" width="120" height="48" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.4"/>
  <text x="430" y="141" text-anchor="middle" font-size="9.5" font-weight="600" fill="#c0392b">3. Create</text>
  <text x="430" y="156" text-anchor="middle" font-size="9.5" font-weight="600" fill="#c0392b">Shipment ✕ fails</text>

  <rect x="540" y="120" width="120" height="48" rx="6" fill="#f4f6f8" stroke="#6a7178" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="600" y="141" text-anchor="middle" font-size="9.5" fill="#6a7178">4. Notify</text>
  <text x="600" y="156" text-anchor="middle" font-size="9.5" fill="#6a7178">User (skipped)</text>

  <line x1="150" y1="144" x2="200" y2="144" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#sagaArrow)"/>
  <line x1="320" y1="144" x2="370" y2="144" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#sagaArrow)"/>
  <line x1="490" y1="144" x2="540" y2="144" stroke="#6a7178" stroke-width="1.2" stroke-dasharray="3,3"/>

  <text x="350" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">Step 3 fails → orchestrator runs compensations in reverse order</text>

  <rect x="200" y="225" width="120" height="46" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.4"/>
  <text x="260" y="246" text-anchor="middle" font-size="9.5" font-weight="600" fill="#c0392b">Undo: refund</text>
  <text x="260" y="260" text-anchor="middle" font-size="9.5" font-weight="600" fill="#c0392b">Payment</text>

  <rect x="30" y="225" width="120" height="46" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.4"/>
  <text x="90" y="246" text-anchor="middle" font-size="9.5" font-weight="600" fill="#c0392b">Undo: release</text>
  <text x="90" y="260" text-anchor="middle" font-size="9.5" font-weight="600" fill="#c0392b">Inventory</text>

  <line x1="430" y1="168" x2="290" y2="235" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#sagaArrowBad)"/>
  <line x1="260" y1="225" x2="150" y2="248" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#sagaArrowBad)"/>

  <text x="350" y="300" text-anchor="middle" font-size="10" fill="#6a7178">Each step is its own local transaction; a failed step triggers compensating "undo" actions for every step already committed, in reverse order.</text>

  <title>SAGA orchestration: a central orchestrator drives a chain of local transactions; when a step fails, it runs compensating actions for every previously completed step in reverse order</title>
</svg>
