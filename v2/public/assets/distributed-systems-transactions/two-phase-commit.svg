<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="tpcArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="tpcArrowGood" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f8f4e"/>
    </marker>
    <marker id="tpcArrowBad" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect x="290" y="16" width="120" height="48" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="350" y="37" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Coordinator</text>
  <text x="350" y="53" text-anchor="middle" font-size="8.5" fill="#eaf1f8">drives the vote</text>

  <rect x="70" y="130" width="130" height="46" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="135" y="157" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2f33">Participant 1 (DB A)</text>

  <rect x="500" y="130" width="130" height="46" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="565" y="157" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2f33">Participant 2 (DB B)</text>

  <text x="350" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#2d2f33">Phase 1 — Prepare / Vote</text>
  <line x1="310" y1="64" x2="150" y2="128" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#tpcArrow)"/>
  <line x1="390" y1="64" x2="560" y2="128" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#tpcArrow)"/>
  <text x="200" y="108" text-anchor="middle" font-size="8.5" fill="#6a7178">"can you commit?"</text>

  <line x1="150" y1="130" x2="310" y2="70" stroke="#2f8f4e" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#tpcArrowGood)"/>
  <line x1="560" y1="130" x2="390" y2="70" stroke="#2f8f4e" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#tpcArrowGood)"/>
  <text x="530" y="108" text-anchor="middle" font-size="8.5" fill="#2f8f4e">"yes, ready"</text>

  <text x="350" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="#2d2f33">Phase 2 — Commit</text>
  <line x1="230" y1="176" x2="330" y2="230" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#tpcArrowGood)"/>
  <line x1="470" y1="176" x2="370" y2="230" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#tpcArrowGood)"/>

  <rect x="290" y="235" width="120" height="46" rx="8" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.5"/>
  <text x="350" y="255" text-anchor="middle" font-size="10" font-weight="700" fill="#2f8f4e">All voted yes</text>
  <text x="350" y="270" text-anchor="middle" font-size="8" fill="#2f8f4e">coordinator sends COMMIT</text>

  <rect x="130" y="300" width="440" height="34" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.3"/>
  <text x="350" y="321" text-anchor="middle" font-size="9.5" fill="#c0392b">If the coordinator crashes right after Prepare, participants are stuck "prepared" — blocked, unable to commit or abort alone.</text>

  <title>Two-Phase Commit: the coordinator collects prepare votes from all participants, then sends commit only if every vote was yes; a crash between phases leaves participants blocked</title>
</svg>
