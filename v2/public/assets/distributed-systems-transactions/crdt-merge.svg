<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="crdtArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="40" y="30" width="220" height="80" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="150" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#2d2f33">Replica 1 (offline edits)</text>
  <text x="150" y="72" text-anchor="middle" font-size="9.5" fill="#2d2f33">G-Counter: {R1: 3, R2: 0}</text>
  <text x="150" y="90" text-anchor="middle" font-size="9" fill="#6a7178">3 independent increments</text>

  <rect x="440" y="30" width="220" height="80" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="550" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#2d2f33">Replica 2 (offline edits)</text>
  <text x="550" y="72" text-anchor="middle" font-size="9.5" fill="#2d2f33">G-Counter: {R1: 0, R2: 5}</text>
  <text x="550" y="90" text-anchor="middle" font-size="9" fill="#6a7178">5 independent increments</text>

  <line x1="200" y1="112" x2="320" y2="170" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#crdtArrow)"/>
  <line x1="500" y1="112" x2="380" y2="170" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#crdtArrow)"/>
  <text x="350" y="140" text-anchor="middle" font-size="9" fill="#6a7178">merge (element-wise max per replica, then sum)</text>

  <rect x="250" y="175" width="200" height="70" rx="8" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.6"/>
  <text x="350" y="198" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2f8f4e">Merged state</text>
  <text x="350" y="216" text-anchor="middle" font-size="9.5" fill="#2f8f4e">max(3,0) + max(0,5) = 8</text>
  <text x="350" y="232" text-anchor="middle" font-size="9" fill="#2f8f4e">both replicas converge to 8</text>

  <text x="350" y="275" text-anchor="middle" font-size="10" fill="#6a7178">No coordination or conflict resolution needed — the merge function is commutative,</text>
  <text x="350" y="291" text-anchor="middle" font-size="10" fill="#6a7178">associative, and idempotent, so any order or repetition of merges reaches the same result.</text>

  <title>CRDT merge: two replicas of a G-Counter increment independently while offline; merging by taking the per-replica max and summing always converges to the same correct total, with no coordination required</title>
</svg>
