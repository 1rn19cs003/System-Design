<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="280" height="220" rx="8" fill="#f6f8fa" stroke="#e3e6ea" stroke-width="1.2"/>
  <text x="160" y="46" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Low latency</text>

  <rect x="45" y="110" width="60" height="40" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="75" y="134" text-anchor="middle" font-size="11" fill="#2d2f33">Client</text>

  <rect x="195" y="110" width="70" height="40" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="230" y="134" text-anchor="middle" font-size="11" fill="#2d2f33">Worker</text>

  <line x1="105" y1="130" x2="195" y2="130" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="160" y="185" text-anchor="middle" font-size="11" fill="#6a7178">1 request at a time</text>
  <text x="160" y="203" text-anchor="middle" font-size="11" fill="#6a7178">fast per request</text>
  <text x="160" y="221" text-anchor="middle" font-size="11" fill="#6a7178">low total volume</text>

  <rect x="340" y="20" width="280" height="220" rx="8" fill="#f6f8fa" stroke="#e3e6ea" stroke-width="1.2"/>
  <text x="480" y="46" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">High throughput</text>

  <rect x="365" y="90" width="60" height="34" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="395" y="111" text-anchor="middle" font-size="11" fill="#2d2f33">Client</text>

  <rect x="500" y="65" width="70" height="34" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="535" y="86" text-anchor="middle" font-size="10" fill="#2d2f33">Worker 1</text>

  <rect x="500" y="107" width="70" height="34" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="535" y="128" text-anchor="middle" font-size="10" fill="#2d2f33">Worker 2</text>

  <rect x="500" y="149" width="70" height="34" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="535" y="170" text-anchor="middle" font-size="10" fill="#2d2f33">Worker 3</text>

  <line x1="425" y1="100" x2="500" y2="82" stroke="#3b6ea5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="425" y1="107" x2="500" y2="124" stroke="#3b6ea5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="425" y1="112" x2="500" y2="166" stroke="#3b6ea5" stroke-width="1.2" marker-end="url(#arrow)"/>

  <text x="480" y="205" text-anchor="middle" font-size="11" fill="#6a7178">many requests in parallel</text>
  <text x="480" y="223" text-anchor="middle" font-size="11" fill="#6a7178">more total work per second</text>

  <title>Latency vs throughput</title>
</svg>
