<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .box { fill: #ffffff; stroke: #3b6ea5; stroke-width: 1.5; }
    .title-bg { fill: #eaf1f8; }
    .title { font-size: 13.5px; font-weight: 600; fill: #2d2f33; }
    .line { fill: #2d2f33; font-size: 11.5px; }
    .divider { stroke: #3b6ea5; stroke-width: 1; }
    .arrow-hollow { stroke: #6a7178; stroke-width: 1.5; fill: none; }
    .label { font-size: 11px; fill: #6a7178; }
    .italic { font-style: italic; }
  </style>

  <!-- NotificationFactory (abstract Creator) -->
  <rect x="30" y="20" width="230" height="90" rx="8" class="box"/>
  <rect x="30" y="20" width="230" height="28" rx="8" class="title-bg"/>
  <rect x="30" y="40" width="230" height="8" class="title-bg"/>
  <text x="145" y="38" text-anchor="middle" class="title italic">«abstract» NotificationFactory</text>
  <line x1="30" y1="48" x2="260" y2="48" class="divider"/>
  <text x="42" y="66" class="line italic">+ createNotification(): Notification</text>
  <text x="42" y="84" class="line">+ send(): void</text>

  <!-- EmailNotificationFactory -->
  <rect x="30" y="150" width="230" height="50" rx="8" class="box"/>
  <rect x="30" y="150" width="230" height="26" rx="8" class="title-bg"/>
  <rect x="30" y="168" width="230" height="8" class="title-bg"/>
  <text x="145" y="167" text-anchor="middle" class="title">EmailNotificationFactory</text>
  <line x1="30" y1="176" x2="260" y2="176" class="divider"/>
  <text x="42" y="192" class="line">+ createNotification(): Notification</text>

  <!-- SMSNotificationFactory -->
  <rect x="30" y="220" width="230" height="50" rx="8" class="box"/>
  <rect x="30" y="220" width="230" height="26" rx="8" class="title-bg"/>
  <rect x="30" y="238" width="230" height="8" class="title-bg"/>
  <text x="145" y="237" text-anchor="middle" class="title">SMSNotificationFactory</text>
  <line x1="30" y1="246" x2="260" y2="246" class="divider"/>
  <text x="42" y="262" class="line">+ createNotification(): Notification</text>

  <!-- Inheritance arrows Creator side -->
  <line x1="145" y1="150" x2="145" y2="113" class="arrow-hollow" marker-end="url(#hollow)"/>
  <line x1="145" y1="220" x2="145" y2="113" class="arrow-hollow" marker-end="url(#hollow)"/>

  <!-- Notification interface -->
  <rect x="420" y="20" width="220" height="70" rx="8" class="box"/>
  <rect x="420" y="20" width="220" height="28" rx="8" class="title-bg"/>
  <rect x="420" y="40" width="220" height="8" class="title-bg"/>
  <text x="530" y="38" text-anchor="middle" class="title italic">«interface» Notification</text>
  <line x1="420" y1="48" x2="640" y2="48" class="divider"/>
  <text x="432" y="66" class="line italic">+ notifyUser(): void</text>

  <!-- EmailNotification -->
  <rect x="420" y="150" width="220" height="46" rx="8" class="box"/>
  <rect x="420" y="150" width="220" height="26" rx="8" class="title-bg"/>
  <rect x="420" y="168" width="220" height="8" class="title-bg"/>
  <text x="530" y="167" text-anchor="middle" class="title">EmailNotification</text>
  <line x1="420" y1="176" x2="640" y2="176" class="divider"/>
  <text x="432" y="190" class="line">+ notifyUser(): void</text>

  <!-- SMSNotification -->
  <rect x="420" y="220" width="220" height="46" rx="8" class="box"/>
  <rect x="420" y="220" width="220" height="26" rx="8" class="title-bg"/>
  <rect x="420" y="238" width="220" height="8" class="title-bg"/>
  <text x="530" y="237" text-anchor="middle" class="title">SMSNotification</text>
  <line x1="420" y1="246" x2="640" y2="246" class="divider"/>
  <text x="432" y="260" class="line">+ notifyUser(): void</text>

  <!-- Inheritance arrows Product side -->
  <line x1="530" y1="150" x2="530" y2="93" class="arrow-hollow" marker-end="url(#hollow)"/>
  <line x1="530" y1="220" x2="530" y2="93" class="arrow-hollow" marker-end="url(#hollow)"/>

  <!-- dependency Creator -> Product -->
  <line x1="260" y1="65" x2="418" y2="55" class="arrow-hollow" stroke-dasharray="4 3" marker-end="url(#open)"/>
  <text x="290" y="58" class="label">creates →</text>

  <defs>
    <marker id="hollow" markerWidth="14" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 Z" fill="#ffffff" stroke="#6a7178" stroke-width="1.2"/>
    </marker>
    <marker id="open" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#6a7178"/>
    </marker>
  </defs>

  <text x="350" y="330" text-anchor="middle" class="label">Each ConcreteCreator's factory method returns its matching ConcreteProduct — the Creator's other logic never changes.</text>
</svg>
