<svg viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <text x="180" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#2d2f33">Single point of failure</text>

  <rect x="110" y="55" width="140" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="180" y="82" text-anchor="middle" font-size="11" fill="#2d2f33">Client traffic</text>

  <line x1="180" y1="100" x2="180" y2="128" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow2)"/>

  <rect x="120" y="133" width="120" height="55" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.6"/>
  <text x="180" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#c0392b">One server</text>
  <text x="180" y="178" text-anchor="middle" font-size="9.5" fill="#c0392b">✕ crashes → outage</text>

  <text x="180" y="220" text-anchor="middle" font-size="10.5" fill="#6a7178">If this one box goes down, every user is affected</text>
  <text x="180" y="238" text-anchor="middle" font-size="10.5" fill="#6a7178">at the same time. Nothing left to take over.</text>

  <line x1="360" y1="20" x2="360" y2="260" stroke="#e3e6ea" stroke-width="1"/>

  <text x="540" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#2d2f33">Redundancy + failover</text>

  <rect x="470" y="55" width="140" height="40" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="540" y="79" text-anchor="middle" font-size="11" fill="#2d2f33">Client traffic</text>

  <line x1="540" y1="95" x2="540" y2="118" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow2)"/>

  <rect x="465" y="123" width="150" height="35" rx="6" fill="#3b6ea5" stroke="#3b6ea5"/>
  <text x="540" y="145" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">Health-checked LB</text>

  <line x1="500" y1="158" x2="470" y2="185" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow2)"/>
  <line x1="580" y1="158" x2="610" y2="185" stroke="#c7ccd1" stroke-width="1.3" stroke-dasharray="3,3"/>

  <rect x="415" y="190" width="110" height="45" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.5"/>
  <text x="470" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#2f8f4e">Server A</text>
  <text x="470" y="226" text-anchor="middle" font-size="8.5" fill="#2f8f4e">active</text>

  <rect x="555" y="190" width="110" height="45" rx="6" fill="#f4f6f8" stroke="#6a7178" stroke-width="1.4" stroke-dasharray="4,3"/>
  <text x="610" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#6a7178">Server B</text>
  <text x="610" y="226" text-anchor="middle" font-size="8.5" fill="#6a7178">standby</text>

  <text x="540" y="260" text-anchor="middle" font-size="10.5" fill="#6a7178">If A fails a health check, traffic shifts to B — users barely notice</text>

  <title>A single server is a single point of failure; redundant servers behind a health-checking load balancer survive one failing</title>
</svg>
