<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <text x="180" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#2d2f33">Vertical scaling</text>
  <text x="180" y="42" text-anchor="middle" font-size="10.5" fill="#6a7178">make the one machine bigger</text>

  <rect x="110" y="60" width="70" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="145" y="87" text-anchor="middle" font-size="10.5" fill="#2d2f33">2 CPU</text>

  <line x1="145" y1="105" x2="145" y2="130" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>

  <rect x="95" y="135" width="100" height="60" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="145" y="169" text-anchor="middle" font-size="11.5" fill="#2d2f33">8 CPU</text>

  <line x1="145" y1="195" x2="145" y2="220" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>

  <rect x="70" y="225" width="150" height="75" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="145" y="267" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">32 CPU</text>

  <text x="180" y="312" text-anchor="middle" font-size="10" fill="#6a7178">One box, growing — simple, but has a ceiling and a single point of failure</text>

  <line x1="360" y1="20" x2="360" y2="300" stroke="#e3e6ea" stroke-width="1"/>

  <text x="540" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#2d2f33">Horizontal scaling</text>
  <text x="540" y="42" text-anchor="middle" font-size="10.5" fill="#6a7178">add more machines, same size</text>

  <rect x="400" y="70" width="70" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="435" y="97" text-anchor="middle" font-size="10.5" fill="#2d2f33">Server</text>

  <rect x="505" y="70" width="70" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="540" y="97" text-anchor="middle" font-size="10.5" fill="#2d2f33">Server</text>

  <rect x="610" y="70" width="70" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="645" y="97" text-anchor="middle" font-size="10.5" fill="#2d2f33">Server</text>

  <line x1="435" y1="115" x2="435" y2="145" stroke="#c7ccd1" stroke-width="1.3" stroke-dasharray="3,3"/>
  <line x1="540" y1="115" x2="540" y2="145" stroke="#c7ccd1" stroke-width="1.3" stroke-dasharray="3,3"/>
  <line x1="645" y1="115" x2="645" y2="145" stroke="#c7ccd1" stroke-width="1.3" stroke-dasharray="3,3"/>

  <rect x="475" y="150" width="130" height="45" rx="6" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="540" y="177" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Load Balancer</text>

  <line x1="540" y1="195" x2="540" y2="222" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>

  <rect x="470" y="227" width="140" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="540" y="254" text-anchor="middle" font-size="10.5" fill="#2d2f33">Incoming traffic</text>

  <text x="540" y="312" text-anchor="middle" font-size="10" fill="#6a7178">Many boxes, no ceiling — but now you need a load balancer and shared state</text>

  <title>Vertical scaling (bigger machine) versus horizontal scaling (more machines behind a load balancer)</title>
</svg>
