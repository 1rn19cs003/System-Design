<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="kpArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="kpArrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6a7178"/>
    </marker>
  </defs>

  <text x="350" y="22" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2d2f33">Topic: "orders" (4 partitions)</text>

  <rect x="40" y="35" width="150" height="46" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="115" y="63" text-anchor="middle" font-size="9" font-weight="700" fill="#2d2f33">Partition 0</text>

  <rect x="200" y="35" width="150" height="46" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="275" y="63" text-anchor="middle" font-size="9" font-weight="700" fill="#2d2f33">Partition 1</text>

  <rect x="360" y="35" width="150" height="46" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="435" y="63" text-anchor="middle" font-size="9" font-weight="700" fill="#2d2f33">Partition 2</text>

  <rect x="520" y="35" width="150" height="46" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="595" y="63" text-anchor="middle" font-size="9" font-weight="700" fill="#2d2f33">Partition 3</text>

  <text x="350" y="103" text-anchor="middle" font-size="8.5" fill="#6a7178">consumer group "order-processors"</text>

  <line x1="115" y1="81" x2="115" y2="120" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#kpArrow)"/>
  <line x1="275" y1="81" x2="275" y2="120" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#kpArrow)"/>
  <line x1="435" y1="81" x2="435" y2="120" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#kpArrow)"/>
  <line x1="595" y1="81" x2="595" y2="120" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#kpArrow)"/>

  <rect x="40" y="125" width="150" height="50" rx="8" fill="#2f8f4e" stroke="#2f8f4e" stroke-width="1.5"/>
  <text x="115" y="147" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Consumer 1</text>
  <text x="115" y="162" text-anchor="middle" font-size="7.5" fill="#eef8f0">owns partition 0</text>

  <rect x="200" y="125" width="150" height="50" rx="8" fill="#2f8f4e" stroke="#2f8f4e" stroke-width="1.5"/>
  <text x="275" y="147" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Consumer 2</text>
  <text x="275" y="162" text-anchor="middle" font-size="7.5" fill="#eef8f0">owns partition 1</text>

  <rect x="360" y="125" width="150" height="50" rx="8" fill="#2f8f4e" stroke="#2f8f4e" stroke-width="1.5"/>
  <text x="435" y="147" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Consumer 3</text>
  <text x="435" y="162" text-anchor="middle" font-size="7.5" fill="#eef8f0">owns partition 2</text>

  <rect x="520" y="125" width="150" height="50" rx="8" fill="#2f8f4e" stroke="#2f8f4e" stroke-width="1.5"/>
  <text x="595" y="147" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Consumer 4</text>
  <text x="595" y="162" text-anchor="middle" font-size="7.5" fill="#eef8f0">owns partition 3</text>

  <rect x="270" y="205" width="160" height="46" rx="8" fill="#f4f6f8" stroke="#6a7178" stroke-width="1.3" stroke-dasharray="3,2"/>
  <text x="350" y="225" text-anchor="middle" font-size="9" font-weight="700" fill="#6a7178">Consumer 5 (idle)</text>
  <text x="350" y="239" text-anchor="middle" font-size="7.5" fill="#6a7178">no 5th partition to assign</text>
  <line x1="350" y1="175" x2="350" y2="203" stroke="#6a7178" stroke-width="1.1" stroke-dasharray="3,3" marker-end="url(#kpArrowGray)"/>

  <text x="350" y="285" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Partitions are the unit of parallelism, not consumers.</text>
  <text x="350" y="302" text-anchor="middle" font-size="10.5" fill="#6a7178">A consumer group scales up to — but never beyond — the topic's partition count.</text>

  <title>Kafka-style partitioning: a topic split into 4 partitions, each owned by exactly one consumer instance in a consumer group for parallel processing; a 5th consumer instance sits idle because there is no partition left to assign it</title>
</svg>
