<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="mrArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="140" height="34" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="90" y="41" text-anchor="middle" font-size="8.5" fill="#2d2f33">Input: "the cat sat"</text>

  <rect x="180" y="20" width="140" height="34" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="250" y="41" text-anchor="middle" font-size="8.5" fill="#2d2f33">Input: "the dog sat"</text>

  <line x1="90" y1="54" x2="90" y2="80" stroke="#3b6ea5" stroke-width="1.2" marker-end="url(#mrArrow)"/>
  <line x1="250" y1="54" x2="250" y2="80" stroke="#3b6ea5" stroke-width="1.2" marker-end="url(#mrArrow)"/>

  <rect x="20" y="85" width="140" height="50" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="90" y="105" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Mapper 1</text>
  <text x="90" y="120" text-anchor="middle" font-size="7.5" fill="#eaf1f8">(the,1)(cat,1)(sat,1)</text>

  <rect x="180" y="85" width="140" height="50" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="250" y="105" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Mapper 2</text>
  <text x="250" y="120" text-anchor="middle" font-size="7.5" fill="#eaf1f8">(the,1)(dog,1)(sat,1)</text>

  <text x="180" y="20" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2d2f33"></text>
  <text x="345" y="105" font-size="9" font-weight="700" fill="#2d2f33">map: split into (word, 1) pairs</text>

  <line x1="90" y1="135" x2="250" y2="175" stroke="#6a7178" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="250" y1="135" x2="250" y2="175" stroke="#6a7178" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="410" y1="135" x2="250" y2="175" stroke="#6a7178" stroke-width="1" stroke-dasharray="3,3" opacity="0"/>

  <rect x="120" y="180" width="260" height="45" rx="8" fill="#f4f6f8" stroke="#6a7178" stroke-width="1.3"/>
  <text x="250" y="199" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2d2f33">Shuffle &amp; sort</text>
  <text x="250" y="214" text-anchor="middle" font-size="7.5" fill="#6a7178">group all values by key: the:[1,1] cat:[1] dog:[1] sat:[1,1]</text>

  <line x1="200" y1="225" x2="120" y2="255" stroke="#2f8f4e" stroke-width="1.2" marker-end="url(#mrArrow)"/>
  <line x1="300" y1="225" x2="380" y2="255" stroke="#2f8f4e" stroke-width="1.2" marker-end="url(#mrArrow)"/>

  <rect x="30" y="260" width="150" height="50" rx="8" fill="#2f8f4e" stroke="#2f8f4e" stroke-width="1.5"/>
  <text x="105" y="280" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Reducer A</text>
  <text x="105" y="295" text-anchor="middle" font-size="7.5" fill="#eef8f0">cat:1  dog:1  sat:2</text>

  <rect x="330" y="260" width="150" height="50" rx="8" fill="#2f8f4e" stroke="#2f8f4e" stroke-width="1.5"/>
  <text x="405" y="280" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Reducer B</text>
  <text x="405" y="295" text-anchor="middle" font-size="7.5" fill="#eef8f0">the:2</text>

  <text x="600" y="105" text-anchor="middle" font-size="9" fill="#6a7178">Each mapper works on</text>
  <text x="600" y="120" text-anchor="middle" font-size="9" fill="#6a7178">its own input split, in</text>
  <text x="600" y="135" text-anchor="middle" font-size="9" fill="#6a7178">parallel, independently.</text>

  <text x="600" y="200" text-anchor="middle" font-size="9" fill="#6a7178">Shuffle groups every</text>
  <text x="600" y="215" text-anchor="middle" font-size="9" fill="#6a7178">pair with the same key</text>
  <text x="600" y="230" text-anchor="middle" font-size="9" fill="#6a7178">onto one reducer.</text>

  <text x="600" y="280" text-anchor="middle" font-size="9" fill="#6a7178">Reducers sum the</text>
  <text x="600" y="295" text-anchor="middle" font-size="9" fill="#6a7178">values per key to get</text>
  <text x="600" y="310" text-anchor="middle" font-size="9" fill="#6a7178">final word counts.</text>

  <title>MapReduce word count: two mappers independently split their input text into (word, 1) pairs, a shuffle-and-sort step groups all pairs by word key across the cluster, and reducers sum the counts for each key to produce the final word frequencies</title>
</svg>
