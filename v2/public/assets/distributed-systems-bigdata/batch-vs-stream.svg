<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="bsArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="bsArrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f8f4e"/>
    </marker>
  </defs>

  <text x="175" y="24" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2d2f33">Batch — accumulate, then process on a schedule</text>

  <rect x="30" y="55" width="40" height="30" rx="4" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.1"/>
  <rect x="80" y="55" width="40" height="30" rx="4" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.1"/>
  <rect x="130" y="55" width="40" height="30" rx="4" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.1"/>
  <rect x="180" y="55" width="40" height="30" rx="4" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.1"/>
  <rect x="230" y="55" width="40" height="30" rx="4" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.1"/>
  <rect x="280" y="55" width="40" height="30" rx="4" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.1"/>
  <text x="175" y="100" text-anchor="middle" font-size="8.5" fill="#6a7178">a full day's events accumulate in storage</text>

  <line x1="175" y1="110" x2="175" y2="135" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#bsArrow)"/>

  <rect x="75" y="140" width="200" height="45" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="175" y="162" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">Nightly batch job</text>
  <text x="175" y="178" text-anchor="middle" font-size="8" fill="#eaf1f8">runs once, processes the whole chunk</text>

  <line x1="175" y1="185" x2="175" y2="210" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#bsArrow)"/>

  <rect x="95" y="215" width="160" height="34" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="175" y="236" text-anchor="middle" font-size="9" fill="#2d2f33">report ready next morning</text>

  <text x="175" y="280" text-anchor="middle" font-size="9.5" fill="#6a7178">high latency, high throughput —</text>
  <text x="175" y="296" text-anchor="middle" font-size="9.5" fill="#6a7178">optimized for processing huge chunks efficiently</text>

  <line x1="350" y1="20" x2="350" y2="300" stroke="#d8dde2" stroke-width="1"/>

  <text x="525" y="24" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2d2f33">Stream — process continuously, event by event</text>

  <circle cx="410" cy="70" r="10" fill="#2f8f4e"/>
  <circle cx="440" cy="70" r="10" fill="#2f8f4e"/>
  <circle cx="470" cy="70" r="10" fill="#2f8f4e"/>
  <line x1="480" y1="70" x2="520" y2="70" stroke="#6a7178" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="450" y="95" text-anchor="middle" font-size="8" fill="#6a7178">events arrive continuously, one at a time</text>

  <line x1="525" y1="105" x2="525" y2="130" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#bsArrowG)"/>

  <rect x="450" y="135" width="150" height="45" rx="8" fill="#2f8f4e" stroke="#2f8f4e" stroke-width="1.6"/>
  <text x="525" y="157" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">Stream processor</text>
  <text x="525" y="173" text-anchor="middle" font-size="8" fill="#eef8f0">handles each record as it arrives</text>

  <line x1="525" y1="180" x2="525" y2="205" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#bsArrowG)"/>

  <rect x="460" y="210" width="130" height="34" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.2"/>
  <text x="525" y="231" text-anchor="middle" font-size="9" fill="#2d2f33">result within milliseconds</text>

  <text x="525" y="280" text-anchor="middle" font-size="9.5" fill="#6a7178">low latency, per-record overhead —</text>
  <text x="525" y="296" text-anchor="middle" font-size="9.5" fill="#6a7178">built for immediate reaction (e.g. fraud detection)</text>

  <title>Batch versus stream processing: a batch job accumulates a full day of data and processes it all at once on a schedule producing a report by morning, while a stream processor consumes events continuously as they arrive and produces results within milliseconds</title>
</svg>
