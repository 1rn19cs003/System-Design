<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="gwArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <circle cx="60" cy="60" r="26" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="60" y="65" text-anchor="middle" font-size="9.5" fill="#2d2f33">Client</text>

  <line x1="86" y1="65" x2="240" y2="90" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#gwArrow)"/>

  <rect x="250" y="55" width="200" height="70" rx="10" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="350" y="83" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">API Gateway</text>
  <text x="350" y="100" text-anchor="middle" font-size="8.5" fill="#eaf1f8">routing · auth · rate limiting</text>
  <text x="350" y="114" text-anchor="middle" font-size="8.5" fill="#eaf1f8">request/response transformation</text>

  <line x1="290" y1="125" x2="150" y2="200" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#gwArrow)"/>
  <line x1="350" y1="125" x2="350" y2="200" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#gwArrow)"/>
  <line x1="410" y1="125" x2="550" y2="200" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#gwArrow)"/>

  <rect x="80" y="205" width="140" height="55" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="150" y="228" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Users Service</text>
  <text x="150" y="244" text-anchor="middle" font-size="8" fill="#6a7178">no auth/rate-limit code</text>

  <rect x="280" y="205" width="140" height="55" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="350" y="228" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Orders Service</text>
  <text x="350" y="244" text-anchor="middle" font-size="8" fill="#6a7178">no auth/rate-limit code</text>

  <rect x="480" y="205" width="140" height="55" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="550" y="228" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">Payments Service</text>
  <text x="550" y="244" text-anchor="middle" font-size="8" fill="#6a7178">no auth/rate-limit code</text>

  <text x="350" y="295" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">The gateway is the single entry point in front of every backend service.</text>
  <text x="350" y="313" text-anchor="middle" font-size="11" fill="#6a7178">Cross-cutting concerns live once at the edge instead of being reimplemented in each service.</text>

  <title>An API gateway sitting in front of three backend microservices (Users, Orders, Payments), centrally handling routing, auth, rate limiting, and request/response transformation so individual services stay focused on business logic</title>
</svg>
