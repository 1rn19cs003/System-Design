<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="idArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="idArrowBad" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
    <marker id="idArrowOk" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f8f4e"/>
    </marker>
  </defs>

  <circle cx="60" cy="90" r="26" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="60" y="94" text-anchor="middle" font-size="9" fill="#2d2f33">Client</text>

  <rect x="280" y="20" width="180" height="50" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="370" y="41" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Server</text>
  <text x="370" y="57" text-anchor="middle" font-size="8" fill="#eaf1f8">Idempotency-Key cache</text>

  <line x1="86" y1="78" x2="278" y2="42" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#idArrow)"/>
  <text x="175" y="55" text-anchor="middle" font-size="8.5" fill="#6a7178">POST /charge, Key: abc123</text>

  <line x1="278" y1="60" x2="86" y2="100" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="185" y="98" text-anchor="middle" font-size="8.5" fill="#c0392b">timeout / no response (charge did process!)</text>

  <line x1="86" y1="115" x2="278" y2="58" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#idArrow)"/>
  <text x="175" y="130" text-anchor="middle" font-size="8.5" fill="#6a7178">client retries: same Key: abc123</text>

  <rect x="280" y="150" width="180" height="60" rx="8" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.5"/>
  <text x="370" y="172" text-anchor="middle" font-size="10" font-weight="700" fill="#2f8f4e">Key abc123 seen before</text>
  <text x="370" y="188" text-anchor="middle" font-size="8.5" fill="#2f8f4e">skip reprocessing —</text>
  <text x="370" y="202" text-anchor="middle" font-size="8.5" fill="#2f8f4e">return cached original result</text>

  <line x1="278" y1="180" x2="86" y2="150" stroke="#2f8f4e" stroke-width="1.4" marker-end="url(#idArrowOk)"/>
  <text x="175" y="165" text-anchor="middle" font-size="8.5" fill="#2f8f4e">200 OK (original charge, not a new one)</text>

  <circle cx="60" cy="130" r="0" fill="none"/>

  <text x="350" y="255" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">The client can't tell whether a timeout means "never arrived" or "processed but the reply was lost."</text>
  <text x="350" y="273" text-anchor="middle" font-size="11" fill="#6a7178">Retrying with the same Idempotency-Key lets the server recognize the duplicate and return the</text>
  <text x="350" y="291" text-anchor="middle" font-size="11" fill="#6a7178">original result instead of charging the customer a second time.</text>

  <title>Idempotency key flow: a client's request times out after the server already processed it; the client retries with the same Idempotency-Key header, and the server recognizes the key and returns the cached original result instead of double-processing</title>
</svg>
