<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="rgArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="rgArrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f8f4e"/>
    </marker>
  </defs>

  <text x="175" y="24" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2d2f33">REST — multiple endpoints, fixed shape</text>

  <circle cx="60" cy="150" r="24" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="60" y="155" text-anchor="middle" font-size="8.5" fill="#2d2f33">Client</text>

  <rect x="150" y="50" width="150" height="34" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="225" y="71" text-anchor="middle" font-size="9" fill="#2d2f33">GET /users/1</text>
  <rect x="150" y="98" width="150" height="34" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="225" y="119" text-anchor="middle" font-size="9" fill="#2d2f33">GET /users/1/posts</text>
  <rect x="150" y="146" width="150" height="34" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="225" y="167" text-anchor="middle" font-size="9" fill="#2d2f33">GET /users/1/friends</text>
  <rect x="150" y="194" width="150" height="34" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="225" y="215" text-anchor="middle" font-size="9" fill="#2d2f33">GET /posts/1/comments</text>

  <line x1="84" y1="140" x2="148" y2="67" stroke="#3b6ea5" stroke-width="1.1" marker-end="url(#rgArrow)"/>
  <line x1="84" y1="145" x2="148" y2="115" stroke="#3b6ea5" stroke-width="1.1" marker-end="url(#rgArrow)"/>
  <line x1="84" y1="155" x2="148" y2="163" stroke="#3b6ea5" stroke-width="1.1" marker-end="url(#rgArrow)"/>
  <line x1="84" y1="160" x2="148" y2="211" stroke="#3b6ea5" stroke-width="1.1" marker-end="url(#rgArrow)"/>

  <text x="225" y="255" text-anchor="middle" font-size="9.5" fill="#6a7178">4 round trips; each response has a fixed</text>
  <text x="225" y="271" text-anchor="middle" font-size="9.5" fill="#6a7178">shape — often over- or under-fetching fields</text>

  <line x1="350" y1="20" x2="350" y2="300" stroke="#d8dde2" stroke-width="1"/>

  <text x="525" y="24" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2d2f33">GraphQL — one endpoint, client-shaped query</text>

  <circle cx="410" cy="150" r="24" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="410" y="155" text-anchor="middle" font-size="8.5" fill="#2d2f33">Client</text>

  <rect x="500" y="115" width="160" height="70" rx="8" fill="#2f8f4e" stroke="#2f8f4e" stroke-width="1.6"/>
  <text x="580" y="137" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">POST /graphql</text>
  <text x="580" y="153" text-anchor="middle" font-size="8" fill="#eef8f0">{ user { name, posts { title } } }</text>
  <text x="580" y="167" text-anchor="middle" font-size="8" fill="#eef8f0">exactly the requested fields</text>

  <line x1="434" y1="150" x2="498" y2="150" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#rgArrowG)"/>

  <text x="580" y="220" text-anchor="middle" font-size="9.5" fill="#6a7178">1 round trip; response shape is</text>
  <text x="580" y="236" text-anchor="middle" font-size="9.5" fill="#6a7178">defined by the query, not the server</text>

  <text x="350" y="300" text-anchor="middle" font-size="10.5" fill="#6a7178">REST caches easily per fixed URL; GraphQL trades that away for precise, single-request data shaping.</text>

  <title>REST versus GraphQL: REST requires four separate fixed-shape endpoint calls to assemble a user's posts, friends, and comments, while GraphQL sends one query to a single endpoint and gets back exactly the fields requested</title>
</svg>
