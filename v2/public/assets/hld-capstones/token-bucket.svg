<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="arrow-bad" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="220" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2f33">Bucket (capacity 5) refills at 2 tokens/sec</text>

  <rect x="150" y="45" width="140" height="110" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.6"/>
  <circle cx="180" cy="70" r="9" fill="#3b6ea5"/>
  <circle cx="210" cy="70" r="9" fill="#3b6ea5"/>
  <circle cx="240" cy="70" r="9" fill="#3b6ea5"/>
  <circle cx="180" cy="95" r="9" fill="#3b6ea5"/>
  <circle cx="210" cy="95" r="9" fill="#3b6ea5"/>
  <text x="220" y="135" text-anchor="middle" font-size="10" fill="#2d2f33">5 tokens available</text>

  <line x1="70" y1="65" x2="150" y2="80" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="70" y="52" text-anchor="middle" font-size="9" fill="#6a7178">refill trickles in</text>

  <line x1="220" y1="155" x2="220" y2="195" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="220" y="212" text-anchor="middle" font-size="9" fill="#6a7178">request takes 1 token if available</text>

  <rect x="410" y="60" width="120" height="40" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="470" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#2f8f4e">allowed</text>

  <rect x="410" y="150" width="120" height="40" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.4"/>
  <text x="470" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#c0392b">rejected</text>

  <line x1="290" y1="80" x2="410" y2="80" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="350" y="70" text-anchor="middle" font-size="9" fill="#2f8f4e">token available</text>

  <line x1="290" y1="130" x2="410" y2="168" stroke="#c0392b" stroke-width="1.3" marker-end="url(#arrow-bad)"/>
  <text x="345" y="222" text-anchor="middle" font-size="9" fill="#c0392b">bucket empty</text>

  <title>Token bucket: refill continuously, spend on request, reject when empty</title>
</svg>
