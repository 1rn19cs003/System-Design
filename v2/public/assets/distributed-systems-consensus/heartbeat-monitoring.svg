<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="hbArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="hbArrowBad" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect x="290" y="20" width="130" height="55" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="355" y="43" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Monitor</text>
  <text x="355" y="60" text-anchor="middle" font-size="9" fill="#eaf1f8">tracks last-seen time</text>

  <rect x="60" y="140" width="110" height="50" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="115" y="170" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2f8f4e">Node A — alive</text>

  <rect x="295" y="140" width="110" height="50" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="350" y="170" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2f8f4e">Node B — alive</text>

  <rect x="530" y="140" width="110" height="50" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.4"/>
  <text x="585" y="164" text-anchor="middle" font-size="10.5" font-weight="600" fill="#c0392b">Node C</text>
  <text x="585" y="180" text-anchor="middle" font-size="9" fill="#c0392b">3 missed beats → dead</text>

  <line x1="150" y1="140" x2="320" y2="80" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#hbArrow)"/>
  <line x1="360" y1="140" x2="358" y2="80" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#hbArrow)"/>
  <line x1="560" y1="140" x2="400" y2="80" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#hbArrowBad)"/>

  <text x="230" y="120" text-anchor="middle" font-size="9" fill="#6a7178">heartbeat every 2s</text>
  <text x="470" y="120" text-anchor="middle" font-size="9" fill="#c0392b">last heartbeat 7s ago</text>

  <text x="355" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">Each node pings the monitor on a fixed interval.</text>
  <text x="355" y="243" text-anchor="middle" font-size="11" fill="#6a7178">Miss enough consecutive beats and the monitor marks that node dead,</text>
  <text x="355" y="259" text-anchor="middle" font-size="11" fill="#6a7178">triggering failover or removal from the pool of servers receiving traffic.</text>

  <title>Heartbeat monitoring: nodes ping a monitor on a fixed interval; missed heartbeats trigger the node being marked dead</title>
</svg>
