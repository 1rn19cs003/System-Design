<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="raftArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="raftArrowAck" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f8f4e"/>
    </marker>
  </defs>

  <rect x="290" y="20" width="120" height="50" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="350" y="42" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Leader</text>
  <text x="350" y="58" text-anchor="middle" font-size="8.5" fill="#eaf1f8">appends entry to its log</text>

  <rect x="60" y="140" width="110" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="115" y="167" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2f33">Follower 1</text>

  <rect x="295" y="140" width="110" height="45" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="350" y="167" text-anchor="middle" font-size="10" font-weight="600" fill="#2d2f33">Follower 2</text>

  <rect x="530" y="140" width="110" height="45" rx="6" fill="#f4f6f8" stroke="#6a7178" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="585" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#6a7178">Follower 3</text>
  <text x="585" y="177" text-anchor="middle" font-size="8" fill="#6a7178">(slow / unreachable)</text>

  <line x1="330" y1="70" x2="150" y2="138" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#raftArrow)"/>
  <line x1="350" y1="70" x2="350" y2="138" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#raftArrow)"/>
  <line x1="370" y1="70" x2="560" y2="138" stroke="#3b6ea5" stroke-width="1.3" stroke-dasharray="3,3"/>
  <text x="230" y="115" text-anchor="middle" font-size="9" fill="#6a7178">1. replicate entry</text>

  <line x1="150" y1="185" x2="330" y2="245" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#raftArrowAck)"/>
  <line x1="350" y1="185" x2="350" y2="245" stroke="#2f8f4e" stroke-width="1.3" marker-end="url(#raftArrowAck)"/>
  <text x="240" y="215" text-anchor="middle" font-size="9" fill="#2f8f4e">2. ack</text>

  <rect x="290" y="250" width="120" height="45" rx="8" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.5"/>
  <text x="350" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#2f8f4e">Committed</text>
  <text x="350" y="285" text-anchor="middle" font-size="8" fill="#2f8f4e">2 of 3 acked = majority</text>

  <title>Raft-style consensus: the leader replicates a log entry to followers and commits it once a majority (not all) have acknowledged, tolerating one slow or unreachable follower</title>
</svg>
