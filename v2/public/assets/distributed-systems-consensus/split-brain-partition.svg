<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="sbArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="sbArrowBad" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="350" y="22" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2d2f33">A network partition splits 5 nodes into two groups that cannot reach each other</text>

  <rect x="15" y="45" width="310" height="230" rx="12" fill="#eaf1f8" opacity="0.35" stroke="#3b6ea5" stroke-width="1.3" stroke-dasharray="6,4"/>
  <text x="170" y="65" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3b6ea5">Majority side — 3 of 5 nodes</text>

  <rect x="375" y="45" width="310" height="230" rx="12" fill="#f4f6f8" opacity="0.5" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="6,4"/>
  <text x="530" y="65" text-anchor="middle" font-size="10.5" font-weight="700" fill="#c0392b">Minority side — 2 of 5 nodes</text>

  <line x1="350" y1="40" x2="330" y2="90" stroke="#c0392b" stroke-width="2"/>
  <line x1="330" y1="90" x2="365" y2="140" stroke="#c0392b" stroke-width="2"/>
  <line x1="365" y1="140" x2="335" y2="190" stroke="#c0392b" stroke-width="2"/>
  <line x1="335" y1="190" x2="360" y2="280" stroke="#c0392b" stroke-width="2"/>
  <text x="350" y="300" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c0392b">network partition</text>

  <circle cx="100" cy="115" r="24" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="100" y="119" text-anchor="middle" font-size="9.5" fill="#2d2f33">Node B</text>
  <circle cx="240" cy="115" r="24" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="240" y="119" text-anchor="middle" font-size="9.5" fill="#2d2f33">Node C</text>
  <circle cx="170" cy="175" r="30" fill="#2f8f4e" stroke="#2f8f4e" stroke-width="1.6"/>
  <text x="170" y="172" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">Node A</text>
  <text x="170" y="186" text-anchor="middle" font-size="8.5" fill="#eef8f0">LEADER</text>

  <line x1="115" y1="135" x2="155" y2="160" stroke="#3b6ea5" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#sbArrow)"/>
  <line x1="225" y1="135" x2="185" y2="160" stroke="#3b6ea5" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#sbArrow)"/>

  <rect x="45" y="225" width="250" height="42" rx="8" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="170" y="242" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2f8f4e">3/5 = quorum reached</text>
  <text x="170" y="257" text-anchor="middle" font-size="8.5" fill="#2f8f4e">Node A elected, keeps serving writes</text>

  <circle cx="470" cy="115" r="24" fill="#f4f6f8" stroke="#6a7178" stroke-width="1.3"/>
  <text x="470" y="119" text-anchor="middle" font-size="9.5" fill="#6a7178">Node D</text>
  <circle cx="590" cy="115" r="24" fill="#f4f6f8" stroke="#6a7178" stroke-width="1.3"/>
  <text x="590" y="119" text-anchor="middle" font-size="9.5" fill="#6a7178">Node E</text>

  <line x1="470" y1="139" x2="530" y2="170" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#sbArrowBad)"/>
  <line x1="590" y1="139" x2="530" y2="170" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#sbArrowBad)"/>
  <text x="530" y="190" text-anchor="middle" font-size="8.5" fill="#c0392b">tries to elect a candidate...</text>

  <rect x="405" y="225" width="250" height="42" rx="8" fill="#fdedec" stroke="#c0392b" stroke-width="1.4"/>
  <text x="530" y="242" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c0392b">2/5 ≠ quorum</text>
  <text x="530" y="257" text-anchor="middle" font-size="8.5" fill="#c0392b">no leader elected, correctly refuses writes</text>

  <title>Split-brain avoidance: a network partition isolates 3 nodes from 2; only the majority side has enough votes to elect a leader and keep accepting writes, while the minority side correctly stays leaderless instead of risking a second, conflicting leader</title>
</svg>
