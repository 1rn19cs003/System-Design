<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#2d2f33">Before election: 5 equal peers, no coordinator</text>

  <circle cx="120" cy="80" r="30" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="120" y="85" text-anchor="middle" font-size="10.5" fill="#2d2f33">Node A</text>
  <circle cx="230" cy="80" r="30" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="230" y="85" text-anchor="middle" font-size="10.5" fill="#2d2f33">Node B</text>
  <circle cx="340" cy="80" r="30" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="340" y="85" text-anchor="middle" font-size="10.5" fill="#2d2f33">Node C</text>
  <circle cx="450" cy="80" r="30" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="450" y="85" text-anchor="middle" font-size="10.5" fill="#2d2f33">Node D</text>
  <circle cx="560" cy="80" r="30" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="560" y="85" text-anchor="middle" font-size="10.5" fill="#2d2f33">Node E</text>

  <text x="350" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#2d2f33">After election: majority (3 of 5) voted for Node C</text>

  <circle cx="120" cy="220" r="28" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="120" y="225" text-anchor="middle" font-size="9.5" fill="#2d2f33">follower</text>
  <circle cx="230" cy="220" r="28" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="230" y="225" text-anchor="middle" font-size="9.5" fill="#2d2f33">follower</text>
  <circle cx="340" cy="220" r="34" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="340" y="216" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">Node C</text>
  <text x="340" y="230" text-anchor="middle" font-size="9" fill="#eaf1f8">LEADER</text>
  <circle cx="450" cy="220" r="28" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="450" y="225" text-anchor="middle" font-size="9.5" fill="#2d2f33">follower</text>
  <circle cx="560" cy="220" r="28" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="560" y="225" text-anchor="middle" font-size="9.5" fill="#2d2f33">follower</text>

  <line x1="145" y1="205" x2="310" y2="215" stroke="#3b6ea5" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="255" y1="210" x2="310" y2="216" stroke="#3b6ea5" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="425" y1="210" x2="368" y2="216" stroke="#3b6ea5" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="535" y1="205" x2="368" y2="215" stroke="#3b6ea5" stroke-width="1.2" stroke-dasharray="3,3"/>

  <text x="350" y="285" text-anchor="middle" font-size="11" fill="#6a7178">If the leader's heartbeat stops, followers time out and start a new election —</text>
  <text x="350" y="302" text-anchor="middle" font-size="11" fill="#6a7178">whichever candidate gets a majority of votes becomes the next leader.</text>

  <title>Leader election: five equal peer nodes vote, and a majority elects one node as leader; the rest become followers</title>
</svg>
