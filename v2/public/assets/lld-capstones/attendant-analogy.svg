<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">A parking lot is a small system, not a single class</text>

  <rect x="30" y="55" width="130" height="60" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="95" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">You arrive</text>
  <text x="95" y="100" text-anchor="middle" font-size="10" fill="#6a7178">motorcycle, car, or bus</text>

  <rect x="240" y="55" width="150" height="60" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="315" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Attendant</text>
  <text x="315" y="100" text-anchor="middle" font-size="10" fill="#6a7178">picks the smallest spot that fits</text>

  <rect x="470" y="30" width="70" height="40" rx="5" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="505" y="54" text-anchor="middle" font-size="10" fill="#2d2f33">Small</text>
  <rect x="470" y="90" width="70" height="40" rx="5" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="505" y="114" text-anchor="middle" font-size="10" fill="#2d2f33">Medium</text>
  <rect x="470" y="150" width="70" height="40" rx="5" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="505" y="174" text-anchor="middle" font-size="10" fill="#2d2f33">Large</text>

  <line x1="160" y1="85" x2="240" y2="85" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="390" y1="80" x2="470" y2="50" stroke="#3b6ea5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="390" y1="88" x2="470" y2="108" stroke="#3b6ea5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="390" y1="95" x2="470" y2="168" stroke="#3b6ea5" stroke-width="1.2" marker-end="url(#arrow)"/>

  <text x="350" y="225" text-anchor="middle" font-size="11" fill="#6a7178">You never see the matching logic — you just hand over your key and get a spot.</text>
  <text x="350" y="243" text-anchor="middle" font-size="11" fill="#6a7178">That's OOP encapsulation, a size hierarchy, and a pricing rule, working together as one system.</text>

  <title>A parking lot attendant matching a motorcycle, car, or bus to the smallest available spot that fits</title>
</svg>
