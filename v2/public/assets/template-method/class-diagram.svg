<svg viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="hollow-arrow" markerWidth="14" markerHeight="12" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L12,5 L1,9 z" fill="#ffffff" stroke="#3b6ea5" stroke-width="1"/>
    </marker>
  </defs>

  <rect x="150" y="20" width="340" height="180" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="320" y="42" text-anchor="middle" font-size="14" font-weight="600" fill="#2d2f33">CaffeineBeverage (abstract)</text>
  <line x1="150" y1="50" x2="490" y2="50" stroke="#3b6ea5" stroke-width="1"/>
  <text x="166" y="70" font-size="12" fill="#2d2f33">+ prepareRecipe() [final]</text>
  <text x="186" y="86" font-size="11" fill="#6a7178">1. boilWater()</text>
  <text x="186" y="100" font-size="11" fill="#6a7178">2. brew() — abstract</text>
  <text x="186" y="114" font-size="11" fill="#6a7178">3. pourInCup()</text>
  <text x="186" y="128" font-size="11" fill="#6a7178">4. if wantsCondiments(): addCondiments() — abstract</text>
  <line x1="150" y1="140" x2="490" y2="140" stroke="#3b6ea5" stroke-width="1"/>
  <text x="166" y="158" font-size="12" fill="#2d2f33"># boilWater() / pourInCup() — shared</text>
  <text x="166" y="174" font-size="12" fill="#2d2f33"># brew() / addCondiments() — abstract</text>
  <text x="166" y="190" font-size="12" fill="#2d2f33"># wantsCondiments() — hook, default true</text>

  <rect x="60" y="260" width="200" height="90" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="160" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Tea</text>
  <line x1="60" y1="293" x2="260" y2="293" stroke="#3b6ea5" stroke-width="1"/>
  <text x="76" y="310" font-size="11" fill="#2d2f33">brew(): steep tea</text>
  <text x="76" y="326" font-size="11" fill="#2d2f33">addCondiments(): lemon</text>

  <rect x="380" y="260" width="220" height="100" rx="6" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="490" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#2d2f33">Coffee</text>
  <line x1="380" y1="293" x2="600" y2="293" stroke="#3b6ea5" stroke-width="1"/>
  <text x="396" y="310" font-size="11" fill="#2d2f33">brew(): drip filter</text>
  <text x="396" y="326" font-size="11" fill="#2d2f33">addCondiments(): sugar/milk</text>
  <text x="396" y="342" font-size="11" fill="#2d2f33">wantsCondiments(): false (hook override)</text>

  <line x1="160" y1="260" x2="280" y2="200" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>
  <line x1="490" y1="260" x2="370" y2="200" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hollow-arrow)"/>

  <text x="320" y="230" text-anchor="middle" font-size="11" fill="#6a7178">extends — fills in only the varying steps</text>
</svg>
