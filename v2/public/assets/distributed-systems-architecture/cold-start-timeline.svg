<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="ctArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6a7178"/>
    </marker>
  </defs>

  <text x="20" y="28" font-size="10.5" font-weight="700" fill="#2d2f33">Cold invocation (fresh instance)</text>
  <rect x="20" y="38" width="90" height="34" rx="4" fill="#f4f6f8" stroke="#6a7178" stroke-width="1.2"/>
  <text x="65" y="59" text-anchor="middle" font-size="7.5" fill="#6a7178">provision container</text>

  <rect x="110" y="38" width="80" height="34" fill="#fdf6e3" stroke="#b8860b" stroke-width="1.2"/>
  <text x="150" y="59" text-anchor="middle" font-size="7.5" fill="#8a6600">init runtime</text>

  <rect x="190" y="38" width="80" height="34" fill="#fdf6e3" stroke="#b8860b" stroke-width="1.2"/>
  <text x="230" y="59" text-anchor="middle" font-size="7.5" fill="#8a6600">run init code</text>

  <rect x="270" y="38" width="150" height="34" rx="4" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.3"/>
  <text x="345" y="59" text-anchor="middle" font-size="8" fill="#2f8f4e">handle request (~15ms)</text>

  <line x1="20" y1="80" x2="420" y2="80" stroke="#6a7178" stroke-width="1" marker-end="url(#ctArrow)"/>
  <text x="220" y="95" text-anchor="middle" font-size="8.5" fill="#c0392b" font-weight="700">total ≈ 850ms before the response is ever sent</text>

  <text x="20" y="145" font-size="10.5" font-weight="700" fill="#2d2f33">Warm invocation (reused instance)</text>
  <rect x="20" y="155" width="150" height="34" rx="4" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.3"/>
  <text x="95" y="176" text-anchor="middle" font-size="8" fill="#2f8f4e">handle request (~15ms)</text>

  <line x1="20" y1="197" x2="170" y2="197" stroke="#6a7178" stroke-width="1" marker-end="url(#ctArrow)"/>
  <text x="95" y="212" text-anchor="middle" font-size="8.5" fill="#2f8f4e" font-weight="700">total ≈ 15ms — no provisioning needed</text>

  <line x1="270" y1="230" x2="270" y2="60" stroke="#6a7178" stroke-width="0.8" stroke-dasharray="2,3"/>
  <text x="270" y="245" text-anchor="middle" font-size="7.5" fill="#6a7178">same request handling cost either way —</text>
  <text x="270" y="258" text-anchor="middle" font-size="7.5" fill="#6a7178">the difference is entirely the setup before it</text>

  <text x="350" y="285" text-anchor="middle" font-size="10.5" fill="#2d2f33">The cold-start tax is paid once per fresh instance, not once per request — a busy function stays warm.</text>

  <title>Cold-start timeline: a cold invocation pays container provisioning, runtime init, and application init-code time (roughly 850ms total) before handling the request in ~15ms, while a warm invocation on a reused instance skips straight to handling the request</title>
</svg>
