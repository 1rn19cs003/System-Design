<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="obArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="obArrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect x="30" y="40" width="100" height="42" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="80" y="65" text-anchor="middle" font-size="9" font-weight="600" fill="#2d2f33">Order Svc</text>
  <rect x="30" y="120" width="100" height="42" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="80" y="145" text-anchor="middle" font-size="9" font-weight="600" fill="#2d2f33">Payment Svc</text>
  <rect x="30" y="200" width="100" height="42" rx="6" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="80" y="225" text-anchor="middle" font-size="9" font-weight="600" fill="#2d2f33">Inventory Svc</text>

  <text x="80" y="20" text-anchor="middle" font-size="9" fill="#6a7178">logs · metrics · traces</text>

  <line x1="130" y1="61" x2="255" y2="120" stroke="#3b6ea5" stroke-width="1.1" marker-end="url(#obArrow)"/>
  <line x1="130" y1="141" x2="255" y2="141" stroke="#3b6ea5" stroke-width="1.1" marker-end="url(#obArrow)"/>
  <line x1="130" y1="221" x2="255" y2="160" stroke="#3b6ea5" stroke-width="1.1" marker-end="url(#obArrow)"/>

  <rect x="260" y="95" width="170" height="95" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="345" y="122" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Central Aggregation</text>
  <text x="345" y="140" text-anchor="middle" font-size="8.5" fill="#eaf1f8">logs → Elasticsearch/Kibana</text>
  <text x="345" y="155" text-anchor="middle" font-size="8.5" fill="#eaf1f8">metrics → Prometheus</text>
  <text x="345" y="170" text-anchor="middle" font-size="8.5" fill="#eaf1f8">traces → distributed tracer</text>

  <line x1="430" y1="141" x2="530" y2="141" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#obArrow)"/>

  <rect x="535" y="115" width="130" height="55" rx="8" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="600" y="138" text-anchor="middle" font-size="10" font-weight="700" fill="#2f8f4e">Dashboards</text>
  <text x="600" y="153" text-anchor="middle" font-size="8" fill="#2f8f4e">Grafana / Datadog</text>

  <line x1="345" y1="190" x2="345" y2="235" stroke="#c0392b" stroke-width="1.3" marker-end="url(#obArrowRed)"/>
  <rect x="280" y="240" width="130" height="45" rx="8" fill="#fdedec" stroke="#c0392b" stroke-width="1.4"/>
  <text x="345" y="262" text-anchor="middle" font-size="10" font-weight="700" fill="#c0392b">Alerting</text>
  <text x="345" y="277" text-anchor="middle" font-size="8" fill="#c0392b">pages an on-call engineer</text>

  <text x="345" y="308" text-anchor="middle" font-size="10" fill="#6a7178">Latency, traffic, errors, and saturation — the four golden signals — feed every alert rule.</text>

  <title>Observability stack: multiple services emit logs, metrics, and traces to a central aggregation layer, which powers dashboards and triggers alerts before users notice a problem</title>
</svg>
