<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="chArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="chArrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect x="270" y="20" width="140" height="45" rx="8" fill="#c0392b" stroke="#c0392b" stroke-width="1.5"/>
  <text x="340" y="42" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">Chaos Monkey</text>
  <text x="340" y="57" text-anchor="middle" font-size="8" fill="#fbe4e1">kills an instance at random</text>

  <rect x="60" y="130" width="110" height="45" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.4" stroke-dasharray="4,3"/>
  <text x="115" y="150" text-anchor="middle" font-size="9.5" fill="#c0392b">Instance A</text>
  <text x="115" y="165" text-anchor="middle" font-size="8" fill="#c0392b">killed</text>

  <rect x="200" y="130" width="110" height="45" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="255" y="153" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2f8f4e">Instance B</text>
  <text x="255" y="167" text-anchor="middle" font-size="7.5" fill="#2f8f4e">absorbs traffic</text>

  <rect x="340" y="130" width="110" height="45" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="395" y="153" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2f8f4e">Instance C</text>
  <text x="395" y="167" text-anchor="middle" font-size="7.5" fill="#2f8f4e">absorbs traffic</text>

  <line x1="300" y1="65" x2="140" y2="128" stroke="#c0392b" stroke-width="1.3" marker-end="url(#chArrowRed)"/>
  <text x="200" y="100" text-anchor="middle" font-size="8.5" fill="#c0392b">terminates</text>

  <line x1="115" y1="130" x2="255" y2="132" stroke="#3b6ea5" stroke-width="1.1" stroke-dasharray="3,3" marker-end="url(#chArrow)"/>
  <text x="175" y="118" text-anchor="middle" font-size="8" fill="#3b6ea5">load balancer reroutes traffic</text>

  <rect x="500" y="130" width="150" height="55" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="575" y="153" text-anchor="middle" font-size="10" font-weight="700" fill="#2d2f33">Monitoring</text>
  <text x="575" y="168" text-anchor="middle" font-size="8" fill="#6a7178">confirms zero error-rate spike</text>

  <line x1="450" y1="152" x2="498" y2="152" stroke="#3b6ea5" stroke-width="1.2" marker-end="url(#chArrow)"/>

  <text x="350" y="230" text-anchor="middle" font-size="11" font-weight="600" fill="#2d2f33">A tool deliberately kills a healthy instance in production.</text>
  <text x="350" y="248" text-anchor="middle" font-size="11" fill="#6a7178">If redundancy and failover truly work, traffic reroutes automatically and monitoring stays green —</text>
  <text x="350" y="264" text-anchor="middle" font-size="11" fill="#6a7178">proving resilience by causing the failure, instead of just hoping it would have worked.</text>

  <title>Chaos engineering: a chaos tool randomly kills a running instance in production, the load balancer reroutes traffic to healthy instances, and monitoring confirms whether the system's redundancy actually held up</title>
</svg>
