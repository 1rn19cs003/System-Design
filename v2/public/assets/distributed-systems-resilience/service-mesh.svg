<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="smArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="smArrowMuted" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6a7178"/>
    </marker>
  </defs>

  <rect x="280" y="10" width="140" height="42" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="350" y="30" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">Control Plane</text>
  <text x="350" y="45" text-anchor="middle" font-size="8" fill="#eaf1f8">policy, config, certs</text>

  <g>
    <rect x="60" y="130" width="130" height="70" rx="8" fill="#f4f6f8" stroke="#6a7178" stroke-width="1.2" stroke-dasharray="4,3"/>
    <rect x="70" y="140" width="110" height="30" rx="5" fill="#3b6ea5"/>
    <text x="125" y="159" text-anchor="middle" font-size="8.5" font-weight="700" fill="#ffffff">Service A</text>
    <rect x="70" y="175" width="110" height="20" rx="5" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.1"/>
    <text x="125" y="189" text-anchor="middle" font-size="7.5" fill="#2d2f33">sidecar proxy</text>
  </g>

  <g>
    <rect x="285" y="130" width="130" height="70" rx="8" fill="#f4f6f8" stroke="#6a7178" stroke-width="1.2" stroke-dasharray="4,3"/>
    <rect x="295" y="140" width="110" height="30" rx="5" fill="#3b6ea5"/>
    <text x="350" y="159" text-anchor="middle" font-size="8.5" font-weight="700" fill="#ffffff">Service B</text>
    <rect x="295" y="175" width="110" height="20" rx="5" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.1"/>
    <text x="350" y="189" text-anchor="middle" font-size="7.5" fill="#2d2f33">sidecar proxy</text>
  </g>

  <g>
    <rect x="510" y="130" width="130" height="70" rx="8" fill="#f4f6f8" stroke="#6a7178" stroke-width="1.2" stroke-dasharray="4,3"/>
    <rect x="520" y="140" width="110" height="30" rx="5" fill="#3b6ea5"/>
    <text x="575" y="159" text-anchor="middle" font-size="8.5" font-weight="700" fill="#ffffff">Service C</text>
    <rect x="520" y="175" width="110" height="20" rx="5" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.1"/>
    <text x="575" y="189" text-anchor="middle" font-size="7.5" fill="#2d2f33">sidecar proxy</text>
  </g>

  <line x1="180" y1="185" x2="290" y2="185" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#smArrow)"/>
  <line x1="405" y1="185" x2="515" y2="185" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#smArrow)"/>

  <line x1="200" y1="130" x2="330" y2="55" stroke="#6a7178" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#smArrowMuted)"/>
  <line x1="350" y1="130" x2="350" y2="55" stroke="#6a7178" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#smArrowMuted)"/>
  <line x1="530" y1="130" x2="390" y2="55" stroke="#6a7178" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#smArrowMuted)"/>

  <text x="350" y="240" text-anchor="middle" font-size="10.5" fill="#6a7178">Every service-to-service call is proxied through a sidecar, giving uniform retries,</text>
  <text x="350" y="257" text-anchor="middle" font-size="10.5" fill="#6a7178">mTLS, and observability across the fleet, all centrally configured by the control plane.</text>

  <title>Service mesh: a fleet of services each paired with a sidecar proxy that intercepts all traffic between them, uniformly applying retries, mTLS and observability, configured centrally by a control plane</title>
</svg>
