<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="scArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="220" y="30" width="260" height="180" rx="10" fill="#f4f6f8" stroke="#6a7178" stroke-width="1.3" stroke-dasharray="5,4"/>
  <text x="350" y="50" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6a7178">Pod</text>

  <rect x="245" y="65" width="200" height="65" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="345" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Service Container</text>
  <text x="345" y="110" text-anchor="middle" font-size="8.5" fill="#eaf1f8">unmodified business logic</text>

  <rect x="245" y="150" width="200" height="55" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="345" y="174" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2d2f33">Sidecar Proxy</text>
  <text x="345" y="190" text-anchor="middle" font-size="8.5" fill="#2d2f33">TLS, retries, metrics, logging</text>

  <line x1="345" y1="130" x2="345" y2="148" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#scArrow)"/>
  <text x="380" y="142" font-size="8" fill="#6a7178">localhost</text>

  <line x1="60" y1="178" x2="243" y2="178" stroke="#3b6ea5" stroke-width="1.5" marker-end="url(#scArrow)"/>
  <text x="150" y="168" text-anchor="middle" font-size="9" fill="#6a7178">inbound traffic</text>
  <text x="60" y="200" text-anchor="middle" font-size="9" fill="#2d2f33">Caller</text>
  <circle cx="60" cy="178" r="18" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>

  <line x1="447" y1="178" x2="630" y2="178" stroke="#3b6ea5" stroke-width="1.5" marker-end="url(#scArrow)"/>
  <text x="550" y="168" text-anchor="middle" font-size="9" fill="#6a7178">outbound traffic</text>
  <circle cx="640" cy="178" r="18" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="640" y="212" text-anchor="middle" font-size="9" fill="#2d2f33">Downstream</text>

  <text x="350" y="250" text-anchor="middle" font-size="10.5" fill="#6a7178">All network traffic in and out of the service is transparently routed through the sidecar,</text>
  <text x="350" y="267" text-anchor="middle" font-size="10.5" fill="#6a7178">which handles cross-cutting concerns without a single line of the service's own code changing.</text>

  <title>Sidecar pattern: a helper proxy process deployed alongside a service container in the same pod, intercepting all inbound and outbound traffic to add retries, TLS, logging and metrics without modifying the service itself</title>
</svg>
