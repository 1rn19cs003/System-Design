<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="bhArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="bhArrowBad" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect x="15" y="130" width="105" height="60" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="67" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Service A</text>
  <text x="67" y="171" text-anchor="middle" font-size="8" fill="#eaf1f8">one caller, three pools</text>

  <line x1="120" y1="150" x2="195" y2="75" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#bhArrow)"/>
  <line x1="120" y1="160" x2="195" y2="160" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#bhArrow)"/>
  <line x1="120" y1="170" x2="195" y2="245" stroke="#c0392b" stroke-width="1.3" marker-end="url(#bhArrowBad)"/>

  <rect x="200" y="40" width="185" height="70" rx="8" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="292" y="62" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2f8f4e">Payments Pool (10 threads)</text>
  <g fill="#2f8f4e">
    <rect x="215" y="72" width="10" height="10"/><rect x="230" y="72" width="10" height="10"/><rect x="245" y="72" width="10" height="10"/>
    <rect x="260" y="72" width="10" height="10" fill="#eaf1f8" stroke="#2f8f4e"/><rect x="275" y="72" width="10" height="10" fill="#eaf1f8" stroke="#2f8f4e"/>
  </g>
  <text x="292" y="100" text-anchor="middle" font-size="8" fill="#2f8f4e">3 busy, 7 free — healthy</text>

  <rect x="200" y="125" width="185" height="70" rx="8" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="292" y="147" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2f8f4e">Inventory Pool (10 threads)</text>
  <g fill="#2f8f4e">
    <rect x="215" y="157" width="10" height="10"/><rect x="230" y="157" width="10" height="10"/>
    <rect x="245" y="157" width="10" height="10" fill="#eaf1f8" stroke="#2f8f4e"/><rect x="260" y="157" width="10" height="10" fill="#eaf1f8" stroke="#2f8f4e"/><rect x="275" y="157" width="10" height="10" fill="#eaf1f8" stroke="#2f8f4e"/>
  </g>
  <text x="292" y="185" text-anchor="middle" font-size="8" fill="#2f8f4e">2 busy, 8 free — healthy</text>

  <rect x="200" y="210" width="185" height="70" rx="8" fill="#fdedec" stroke="#c0392b" stroke-width="1.4"/>
  <text x="292" y="232" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c0392b">Recommendations Pool (10)</text>
  <g fill="#c0392b">
    <rect x="215" y="242" width="10" height="10"/><rect x="230" y="242" width="10" height="10"/><rect x="245" y="242" width="10" height="10"/><rect x="260" y="242" width="10" height="10"/><rect x="275" y="242" width="10" height="10"/>
    <rect x="215" y="255" width="10" height="10"/><rect x="230" y="255" width="10" height="10"/><rect x="245" y="255" width="10" height="10"/><rect x="260" y="255" width="10" height="10"/><rect x="275" y="255" width="10" height="10"/>
  </g>
  <text x="292" y="266" text-anchor="middle" font-size="8" fill="#c0392b" font-weight="600">10/10 stuck — pool exhausted</text>

  <line x1="385" y1="75" x2="500" y2="75" stroke="#2f8f4e" stroke-width="1.2" marker-end="url(#bhArrow)"/>
  <rect x="505" y="50" width="180" height="50" rx="8" fill="#eaf1f8" stroke="#2f8f4e" stroke-width="1.2"/>
  <text x="595" y="79" text-anchor="middle" font-size="9.5" fill="#2d2f33">Payments Service — healthy</text>

  <line x1="385" y1="160" x2="500" y2="160" stroke="#2f8f4e" stroke-width="1.2" marker-end="url(#bhArrow)"/>
  <rect x="505" y="135" width="180" height="50" rx="8" fill="#eaf1f8" stroke="#2f8f4e" stroke-width="1.2"/>
  <text x="595" y="164" text-anchor="middle" font-size="9.5" fill="#2d2f33">Inventory Service — healthy</text>

  <line x1="385" y1="245" x2="500" y2="245" stroke="#c0392b" stroke-width="1.2" marker-end="url(#bhArrowBad)"/>
  <rect x="505" y="220" width="180" height="50" rx="8" fill="#fdedec" stroke="#c0392b" stroke-width="1.2"/>
  <text x="595" y="249" text-anchor="middle" font-size="9.5" fill="#c0392b" font-weight="600">Recommendations — slow/timing out</text>

  <text x="350" y="305" text-anchor="middle" font-size="9.5" fill="#6a7178">Each dependency draws from its own thread pool. Recommendations exhausting its pool never touches Payments or Inventory&#8217;s.</text>

  <title>Bulkhead pattern: Service A calls three downstream dependencies, each through its own isolated thread pool. The Recommendations service is slow and has exhausted all 10 threads in its dedicated pool, but the Payments and Inventory pools remain healthy and unaffected because they are separate, isolated resource pools rather than one shared pool</title>
</svg>
