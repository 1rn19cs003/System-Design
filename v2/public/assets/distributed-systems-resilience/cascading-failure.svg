<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="cfArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
    <marker id="cfArrowBad" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
    <marker id="cfArrowGood" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f8f4e"/>
    </marker>
  </defs>

  <text x="175" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#c0392b">Without a circuit breaker</text>

  <rect x="105" y="45" width="140" height="40" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.4"/>
  <text x="175" y="69" text-anchor="middle" font-size="9.5" fill="#c0392b">Service C (slow / down)</text>

  <rect x="105" y="110" width="140" height="40" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.4"/>
  <text x="175" y="130" text-anchor="middle" font-size="9.5" fill="#c0392b">Service B</text>
  <text x="175" y="143" text-anchor="middle" font-size="8" fill="#c0392b">threads blocked waiting on C</text>

  <rect x="105" y="175" width="140" height="40" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.4"/>
  <text x="175" y="195" text-anchor="middle" font-size="9.5" fill="#c0392b">Service A</text>
  <text x="175" y="208" text-anchor="middle" font-size="8" fill="#c0392b">thread pool exhausted too</text>

  <line x1="175" y1="110" x2="175" y2="87" stroke="#c0392b" stroke-width="1.4" marker-end="url(#cfArrowBad)"/>
  <line x1="175" y1="175" x2="175" y2="152" stroke="#c0392b" stroke-width="1.4" marker-end="url(#cfArrowBad)"/>

  <rect x="70" y="235" width="210" height="34" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.3"/>
  <text x="175" y="256" text-anchor="middle" font-size="9" fill="#c0392b">failure snowballs upstream — full outage</text>

  <line x1="330" y1="150" x2="370" y2="150" stroke="#6a7178" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="525" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#2f8f4e">With a circuit breaker</text>

  <rect x="455" y="45" width="140" height="40" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.4"/>
  <text x="525" y="69" text-anchor="middle" font-size="9.5" fill="#c0392b">Service C (slow / down)</text>

  <rect x="455" y="110" width="140" height="40" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="525" y="130" text-anchor="middle" font-size="9.5" fill="#2f8f4e">Service B</text>
  <text x="525" y="143" text-anchor="middle" font-size="8" fill="#2f8f4e">breaker OPEN — fails fast</text>

  <rect x="455" y="175" width="140" height="40" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.4"/>
  <text x="525" y="195" text-anchor="middle" font-size="9.5" fill="#2f8f4e">Service A</text>
  <text x="525" y="208" text-anchor="middle" font-size="8" fill="#2f8f4e">threads free, unaffected</text>

  <line x1="525" y1="110" x2="525" y2="87" stroke="#c0392b" stroke-width="1.4" stroke-dasharray="4,3"/>
  <text x="560" y="100" font-size="7.5" fill="#c0392b">calls stopped</text>
  <line x1="525" y1="175" x2="525" y2="152" stroke="#2f8f4e" stroke-width="1.4"/>

  <rect x="420" y="235" width="210" height="34" rx="6" fill="#eef8f0" stroke="#2f8f4e" stroke-width="1.3"/>
  <text x="525" y="256" text-anchor="middle" font-size="9" fill="#2f8f4e">the breaker isolates the failure — A and B stay healthy</text>

  <text x="350" y="305" text-anchor="middle" font-size="10" fill="#6a7178">A slow dependency without protection exhausts caller thread pools one level at a time.</text>
  <text x="350" y="322" text-anchor="middle" font-size="10" fill="#6a7178">A circuit breaker on the B→C call fails fast instead, stopping the failure from spreading further.</text>

  <title>Cascading failure: a slow downstream service exhausts caller thread pools, propagating failure upstream, versus the same scenario with a circuit breaker that fails fast and contains the damage</title>
</svg>
