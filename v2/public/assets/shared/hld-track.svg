<svg viewBox="0 0 1000 160" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="hldArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b6ea5"/>
    </marker>
  </defs>

  <rect x="10" y="45" width="128" height="64" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="74" y="72" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">1. Fundamentals</text>
  <text x="74" y="88" text-anchor="middle" font-size="8.5" fill="#6a7178">client, DNS, HTTP</text>

  <rect x="153" y="45" width="128" height="64" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="217" y="72" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">2. Load Balancing</text>
  <text x="217" y="88" text-anchor="middle" font-size="8.5" fill="#6a7178">spread the traffic</text>

  <rect x="296" y="45" width="128" height="64" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="360" y="72" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">3. Caching</text>
  <text x="360" y="88" text-anchor="middle" font-size="8.5" fill="#6a7178">skip repeated work</text>

  <rect x="439" y="45" width="128" height="64" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="503" y="72" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">4. Databases</text>
  <text x="503" y="88" text-anchor="middle" font-size="8.5" fill="#6a7178">store &amp; scale data</text>

  <rect x="582" y="45" width="128" height="64" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="646" y="72" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">5. Message Queues</text>
  <text x="646" y="88" text-anchor="middle" font-size="8.5" fill="#6a7178">decouple services</text>

  <rect x="725" y="45" width="128" height="64" rx="8" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="789" y="72" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2d2f33">6. Microservices</text>
  <text x="789" y="88" text-anchor="middle" font-size="8.5" fill="#6a7178">split the system</text>

  <rect x="868" y="35" width="122" height="84" rx="8" fill="#3b6ea5" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="929" y="68" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">7. Capstone</text>
  <text x="929" y="84" text-anchor="middle" font-size="8.5" fill="#eaf1f8">Rate Limiter</text>
  <text x="929" y="98" text-anchor="middle" font-size="8.5" fill="#eaf1f8">(token bucket)</text>

  <line x1="138" y1="77" x2="153" y2="77" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hldArrow)"/>
  <line x1="281" y1="77" x2="296" y2="77" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hldArrow)"/>
  <line x1="424" y1="77" x2="439" y2="77" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hldArrow)"/>
  <line x1="567" y1="77" x2="582" y2="77" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hldArrow)"/>
  <line x1="710" y1="77" x2="725" y2="77" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hldArrow)"/>
  <line x1="853" y1="77" x2="868" y2="77" stroke="#3b6ea5" stroke-width="1.3" marker-end="url(#hldArrow)"/>

  <text x="500" y="140" text-anchor="middle" font-size="10.5" fill="#6a7178">Each topic assumes the ones before it — read top to bottom the first time through</text>

  <title>HLD syllabus: Fundamentals, Load Balancing, Caching, Databases, Message Queues, Microservices, then the Rate Limiter capstone</title>
</svg>
